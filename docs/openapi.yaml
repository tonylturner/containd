openapi: "3.0.3"
info:
  title: containd API
  version: "1.0.0"
  description: |
    REST API for containd -- an ICS/OT firewall management platform.
    Provides configuration, monitoring, and security services for
    industrial control system network environments.

    All paths below are relative to the /api/v1 base path.
    Authenticated endpoints require a JWT obtained via POST /auth/login.
  license:
    name: Apache-2.0

servers:
  - url: /api/v1
    description: Default API base path

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT from POST /auth/login. Send as Authorization header
        or via the token cookie set automatically on login.

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string, format: password }

    LoginResponse:
      type: object
      properties:
        token: { type: string, description: Signed JWT }
        expiresAt: { type: string, format: date-time }
        user: { $ref: "#/components/schemas/User" }

    MFALoginChallenge:
      type: object
      properties:
        mfaRequired: { type: boolean, enum: [true] }
        mfaMethod: { type: string, example: totp }
        mfaChallengeToken: { type: string }
        user: { $ref: "#/components/schemas/User" }

    MFAVerifyLoginRequest:
      type: object
      required: [challengeToken, code]
      properties:
        challengeToken: { type: string }
        code: { type: string }

    MFAEnrollResponse:
      type: object
      properties:
        secret: { type: string }
        otpauthURL: { type: string, format: uri }
        qrDataURL: { type: string }
        challengeToken: { type: string }

    MFAEnableRequest:
      type: object
      required: [challengeToken, code]
      properties:
        challengeToken: { type: string }
        code: { type: string }

    MFADisableRequest:
      type: object
      required: [currentPassword, code]
      properties:
        currentPassword: { type: string, format: password }
        code: { type: string }

    User:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string }
        role: { type: string, enum: [admin, view] }
        mustChangePassword: { type: boolean }
        mfaEnabled: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateUserRequest:
      type: object
      required: [username, role, password]
      properties:
        username: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string }
        role: { type: string, enum: [admin, view] }
        password: { type: string, format: password }

    ErrorResponse:
      type: object
      properties:
        error: { type: string, description: Human-readable error message }
        detail: { type: string, description: Optional additional context }

    HealthResponse:
      type: object
      properties:
        status: { type: string, example: ok }
        component: { type: string, example: mgmt }
        build: { type: string }
        commit: { type: string }
        hostname: { type: string }
        time: { type: string, format: date-time }

    DashboardResponse:
      type: object
      properties:
        health: { $ref: "#/components/schemas/HealthResponse" }
        counts:
          type: object
          properties:
            assets: { type: integer }
            zones: { type: integer }
            interfaces: { type: integer }
            rules: { type: integer }
        eventStats:
          type: object
          properties:
            total: { type: integer }
            idsAlerts: { type: integer }
            modbusWrites: { type: integer }
            avDetections: { type: integer }
            avBlocks: { type: integer }
        services: { type: object }
        user: { type: object }
        lastActivity: { $ref: "#/components/schemas/AuditRecord" }

    Event:
      type: object
      properties:
        id: { type: integer, format: uint64 }
        flowId: { type: string }
        proto: { type: string }
        kind: { type: string }
        attributes: { type: object, additionalProperties: true }
        timestamp: { type: string, format: date-time }
        srcIp: { type: string }
        dstIp: { type: string }
        srcPort: { type: integer }
        dstPort: { type: integer }
        transport: { type: string, enum: [tcp, udp] }
        hash: { type: string }

    FlowSummary:
      type: object
      properties:
        flowId: { type: string }
        firstSeen: { type: string, format: date-time }
        lastSeen: { type: string, format: date-time }
        srcIp: { type: string }
        dstIp: { type: string }
        srcPort: { type: integer }
        dstPort: { type: integer }
        transport: { type: string }
        application: { type: string }
        eventCount: { type: integer, format: uint64 }
        avDetected: { type: boolean }
        avBlocked: { type: boolean }

    AuditRecord:
      type: object
      properties:
        id: { type: integer, format: int64 }
        timestamp: { type: string, format: date-time }
        actor: { type: string }
        source: { type: string, description: "Origin: ui, api, ssh, or cli" }
        action: { type: string }
        target: { type: string }
        result: { type: string, enum: [success, failure] }
        detail: { type: string }

    PolicyAnalysis:
      type: object
      properties:
        rules: { type: array, items: { type: object }, description: Auto-generated allowlist rules }
        profiles:
          type: array
          items: { $ref: "#/components/schemas/LearnedProfile" }
        stats:
          type: object
          properties:
            events: { type: array, items: { type: object } }
            flows: { type: array, items: { type: object } }
            protocols: { type: object, additionalProperties: { type: integer } }
            duration: { type: string, description: Duration of the capture }
            packetCount: { type: integer }
        eventSummary: { type: object, additionalProperties: { type: integer }, description: Event counts keyed by protocol }

    LearnedProfile:
      type: object
      properties:
        protocol: { type: string }
        sourceIP: { type: string }
        destIP: { type: string }
        unitIDs: { type: object, additionalProperties: { type: boolean } }
        functionCodes: { type: object, additionalProperties: { type: boolean } }
        addresses: { type: object, additionalProperties: { type: boolean } }
        readSeen: { type: boolean }
        writeSeen: { type: boolean }
        firstSeen: { type: string, format: date-time }
        lastSeen: { type: string, format: date-time }

    ICSTemplateInfo:
      type: object
      properties:
        name: { type: string, example: modbus_read_only }
        description: { type: string }
        protocol: { type: string, example: modbus }

    ApplyICSTemplateRequest:
      type: object
      required: [template]
      properties:
        template: { type: string, description: "Template name (e.g. modbus_read_only, dnp3_secure_operations)" }
        source_zones: { type: array, items: { type: string } }
        dest_zones: { type: array, items: { type: string } }
        params:
          type: object
          properties:
            ranges: { type: array, items: { type: string }, description: Register address ranges (modbus_register_guard only) }

    RulePreviewResponse:
      type: object
      properties:
        match_count: { type: integer, description: Number of recent events matching the rule }
        sample_matches:
          type: array
          items: { $ref: "#/components/schemas/Event" }
          description: Up to 50 sample matching events
        time_range:
          type: object
          nullable: true
          properties:
            start: { type: string, format: date-time }
            end: { type: string, format: date-time }
        total_events: { type: integer, description: Total events evaluated }

    EngineConfig:
      type: object
      properties:
        dpiMode:
          type: string
          enum: [learn, enforce]
          description: >
            DPI operational mode. "learn" passively observes traffic without blocking.
            "enforce" actively blocks traffic that violates ICS policy rules.
        dpiProtocols:
          type: object
          additionalProperties: { type: boolean }
          description: IT protocol enable/disable map (e.g., {"dns": true, "tls": true})
        dpiIcsProtocols:
          type: object
          additionalProperties: { type: boolean }
          description: >
            ICS protocol enable/disable map. Keys: modbus, dnp3, cip, s7comm, mms, bacnet, opcua.
          example:
            modbus: true
            dnp3: true
            cip: false
            s7comm: false
            mms: true
            bacnet: false
            opcua: false

  parameters:
    pathId:
      name: id
      in: path
      required: true
      schema: { type: string }

paths:
  # ── Health (unauthenticated) ──────────────────────────────────────
  /health:
    get:
      summary: Health check
      security: []
      tags: [System]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthResponse" }

  # ── Auth ──────────────────────────────────────────────────────────
  /auth/login:
    post:
      summary: Authenticate and obtain a JWT
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Login successful or MFA challenge required
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/LoginResponse" }
                  - { $ref: "#/components/schemas/MFALoginChallenge" }
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "429":
          description: Rate-limited
          headers:
            Retry-After: { schema: { type: integer } }

  /auth/login/mfa:
    post:
      summary: Complete login with an MFA code
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MFAVerifyLoginRequest" }
      responses:
        "200":
          description: MFA verified and session created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResponse" }
        "401":
          description: Invalid or expired challenge token or authentication code
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/logout:
    post:
      summary: Invalidate the current session
      security: []
      tags: [Auth]
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      summary: Get current user profile
      tags: [Auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
    patch:
      summary: Update current user profile
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/User" }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }

  /auth/me/mfa/enroll:
    post:
      summary: Start TOTP MFA enrollment for the current user
      tags: [Auth]
      responses:
        "200":
          description: Enrollment material for a new authenticator app
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MFAEnrollResponse" }
        "409": { description: MFA already enabled }

  /auth/me/mfa/enable:
    post:
      summary: Enable TOTP MFA for the current user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MFAEnableRequest" }
      responses:
        "200": { description: MFA enabled }
        "401": { description: Invalid or expired challenge token or authentication code }
        "409": { description: MFA already enabled }

  /auth/me/mfa/disable:
    post:
      summary: Disable TOTP MFA for the current user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MFADisableRequest" }
      responses:
        "200": { description: MFA disabled }
        "401": { description: Current password or authentication code invalid }

  # ── Dashboard ─────────────────────────────────────────────────────
  /dashboard:
    get:
      summary: Aggregated dashboard data
      tags: [Dashboard]
      responses:
        "200":
          description: Dashboard payload
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardResponse" }

  # ── Config ────────────────────────────────────────────────────────
  /config:
    get:
      summary: Get running configuration
      tags: [Config]
      responses:
        "200":
          description: Full device configuration
          content:
            application/json: { schema: { type: object } }
    post:
      summary: Replace running configuration (admin)
      tags: [Config]
      requestBody:
        required: true
        content:
          application/json: { schema: { type: object } }
      responses:
        "200": { description: Configuration saved }
        "403": { description: Admin role required }

  /config/commit:
    post:
      summary: Commit candidate config and apply to data plane
      tags: [Config]
      responses:
        "200": { description: Commit applied }
        "403": { description: Admin role required }

  /config/rollback:
    post:
      summary: Roll back to previous configuration
      tags: [Config]
      responses:
        "200": { description: Rollback applied }
        "403": { description: Admin role required }

  # ── Users (admin) ─────────────────────────────────────────────────
  /users:
    get:
      summary: List all users
      tags: [Users]
      responses:
        "200":
          description: Array of users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }
    post:
      summary: Create a user
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateUserRequest" }
      responses:
        "200":
          description: Created user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "409": { description: Username already taken }

  /users/{id}:
    patch:
      summary: Update a user
      tags: [Users]
      parameters:
        - $ref: "#/components/parameters/pathId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/User" }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "404": { description: User not found }
    delete:
      summary: Delete a user
      tags: [Users]
      parameters:
        - $ref: "#/components/parameters/pathId"
      responses:
        "200": { description: User deleted }
        "404": { description: User not found }

  /users/{id}/mfa/disable:
    post:
      summary: Disable MFA for a user (admin)
      tags: [Users]
      parameters:
        - $ref: "#/components/parameters/pathId"
      responses:
        "200": { description: MFA disabled }
        "404": { description: User not found }

  # ── Services ──────────────────────────────────────────────────────
  # Each service endpoint follows the same pattern:
  #   GET  returns the current config object
  #   POST replaces the config (admin only)
  # Additional services: /services/av, /services/proxy/forward,
  # /services/proxy/reverse, /services/status (GET only)

  /services/syslog:
    get:
      summary: Get syslog configuration
      tags: [Services]
      responses:
        "200": { description: Syslog config, content: { application/json: { schema: { type: object } } } }
    post:
      summary: Set syslog configuration (admin)
      tags: [Services]
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses:
        "200": { description: Updated }

  /services/dns:
    get:
      summary: Get DNS configuration
      tags: [Services]
      responses:
        "200": { description: DNS config, content: { application/json: { schema: { type: object } } } }
    post:
      summary: Set DNS configuration (admin)
      tags: [Services]
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses:
        "200": { description: Updated }

  /services/ntp:
    get:
      summary: Get NTP configuration
      tags: [Services]
      responses:
        "200": { description: NTP config, content: { application/json: { schema: { type: object } } } }
    post:
      summary: Set NTP configuration (admin)
      tags: [Services]
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses:
        "200": { description: Updated }

  /services/dhcp:
    get:
      summary: Get DHCP configuration
      tags: [Services]
      responses:
        "200": { description: DHCP config, content: { application/json: { schema: { type: object } } } }
    post:
      summary: Set DHCP configuration (admin)
      tags: [Services]
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses:
        "200": { description: Updated }

  /services/vpn:
    get:
      summary: Get VPN configuration
      tags: [Services]
      responses:
        "200": { description: VPN config, content: { application/json: { schema: { type: object } } } }
    post:
      summary: Set VPN configuration (admin)
      tags: [Services]
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses:
        "200": { description: Updated }

  # ── Firewall ──────────────────────────────────────────────────────
  /firewall/rules:
    get:
      summary: List firewall rules
      tags: [Firewall]
      responses:
        "200":
          description: Array of firewall rules
          content:
            application/json:
              schema: { type: array, items: { type: object } }
    post:
      summary: Create a firewall rule (admin)
      tags: [Firewall]
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses:
        "200": { description: Rule created }

  /firewall/rules/{id}:
    patch:
      summary: Update a firewall rule (admin)
      tags: [Firewall]
      parameters:
        - $ref: "#/components/parameters/pathId"
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses:
        "200": { description: Rule updated }
    delete:
      summary: Delete a firewall rule (admin)
      tags: [Firewall]
      parameters:
        - $ref: "#/components/parameters/pathId"
      responses:
        "200": { description: Rule deleted }

  # ── Events & Flows ────────────────────────────────────────────────
  /events:
    get:
      summary: List recent ICS/network events
      tags: [Telemetry]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 500, maximum: 5000 }
      responses:
        "200":
          description: Array of events
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Event" } }

  /flows:
    get:
      summary: List aggregated flow summaries
      tags: [Telemetry]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 200, maximum: 5000 }
      responses:
        "200":
          description: Array of flow summaries
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/FlowSummary" } }

  # ── Audit ─────────────────────────────────────────────────────────
  /audit:
    get:
      summary: List audit log records
      tags: [Audit]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 100, maximum: 1000 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Array of audit records
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/AuditRecord" } }

  # ── PCAP Analysis ────────────────────────────────────────────────
  /pcap/analyze:
    post:
      summary: Upload a PCAP file for DPI analysis and policy generation
      tags: [PCAP]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: PCAP or PCAPng file
      responses:
        "200":
          description: Analysis results with generated rules
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicyAnalysis" }
        "400": { description: Invalid or non-PCAP file }

  /pcap/analyze/{name}:
    post:
      summary: Analyze a previously uploaded PCAP by name
      tags: [PCAP]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
          description: Name of an uploaded PCAP file
      responses:
        "200":
          description: Analysis results with generated rules
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicyAnalysis" }
        "404": { description: PCAP not found }

  # ── ICS Rule Templates ──────────────────────────────────────────
  /templates/ics:
    get:
      summary: List available ICS protocol security templates
      tags: [Templates]
      responses:
        "200":
          description: Array of available ICS templates
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ICSTemplateInfo" }

  /templates/ics/apply:
    post:
      summary: Apply an ICS template to generate firewall rules
      tags: [Templates]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApplyICSTemplateRequest" }
      responses:
        "200":
          description: Generated rules from the template
          content:
            application/json:
              schema:
                type: object
                properties:
                  template: { type: string }
                  rules: { type: array, items: { type: object } }
        "400": { description: Unknown template or missing params }

  # ── Rule Impact Preview ─────────────────────────────────────────
  /firewall/rules/preview:
    post:
      summary: Dry-run a proposed rule against recent traffic
      tags: [Firewall]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: A firewall rule definition (same schema as rule creation)
      responses:
        "200":
          description: Preview results showing how many recent events match
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RulePreviewResponse" }
        "400": { description: Invalid rule payload }

  # ── Learn Mode ──────────────────────────────────────────────────
  /learn/profiles:
    get:
      summary: List learned ICS traffic profiles
      tags: [Learn]
      responses:
        "200":
          description: Array of learned traffic profiles
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LearnedProfile" }

  /learn/generate:
    post:
      summary: Generate firewall rules from learned profiles
      tags: [Learn]
      responses:
        "200":
          description: Generated allowlist rules
          content:
            application/json:
              schema: { type: array, items: { type: object } }

  /learn/apply:
    post:
      summary: Apply learned rules to the running configuration
      tags: [Learn]
      responses:
        "200": { description: Learned rules applied to config }
        "400": { description: Learn mode not available }

  /learn:
    delete:
      summary: Clear all learned traffic profiles
      tags: [Learn]
      responses:
        "200": { description: Learned data cleared }
        "400": { description: Learn mode not available }

  # ── Engine / DPI Configuration ─────────────────────────────────
  /engine/config:
    get:
      summary: Get data plane engine configuration
      tags: [Engine]
      responses:
        "200":
          description: Current engine configuration
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EngineConfig" }
    post:
      summary: Update data plane engine configuration (admin)
      description: >
        Configure DPI mode (learn/enforce) and per-protocol enable/disable
        settings. Changes take effect immediately without a config commit.
      tags: [Engine]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EngineConfig" }
      responses:
        "200": { description: Engine configuration updated }
        "400": { description: Invalid configuration }
        "403": { description: Admin role required }

  # ── ICS Inventory ──────────────────────────────────────────────
  /inventory:
    get:
      summary: List discovered ICS assets
      tags: [Inventory]
      responses:
        "200":
          description: Array of discovered ICS assets
          content:
            application/json:
              schema:
                type: array
                items: { type: object }

  # ── Signatures ─────────────────────────────────────────────────
  /signatures:
    get:
      summary: List loaded IDS signatures
      tags: [Signatures]
      responses:
        "200":
          description: Array of signatures
          content:
            application/json:
              schema: { type: array, items: { type: object } }
    post:
      summary: Add a custom IDS signature (admin)
      tags: [Signatures]
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses:
        "200": { description: Signature added }

  /signatures/{id}:
    delete:
      summary: Remove an IDS signature (admin)
      tags: [Signatures]
      parameters:
        - $ref: "#/components/parameters/pathId"
      responses:
        "200": { description: Signature removed }
        "404": { description: Signature not found }

  /signatures/matches:
    get:
      summary: List signature match events
      tags: [Signatures]
      responses:
        "200":
          description: Array of signature match events
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Event" } }

  # ── Anomalies ──────────────────────────────────────────────────
  /anomalies:
    get:
      summary: List detected protocol anomalies
      tags: [Anomalies]
      responses:
        "200":
          description: Array of anomaly events
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Event" } }

  # ── Protocol Statistics ────────────────────────────────────────
  /stats/protocols:
    get:
      summary: Protocol traffic breakdown
      tags: [Statistics]
      responses:
        "200":
          description: Per-protocol traffic counters
          content:
            application/json:
              schema: { type: object, additionalProperties: { type: integer } }

  /stats/top-talkers:
    get:
      summary: Top source/destination pairs by traffic volume
      tags: [Statistics]
      responses:
        "200":
          description: Top talkers
          content:
            application/json:
              schema: { type: array, items: { type: object } }
