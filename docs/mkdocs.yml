site_name: containd
site_url: ""
repo_url: ""

docs_dir: mkdocs
site_dir: ../site

theme:
  name: material
  custom_dir: mkdocs/overrides
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
  palette:
    - scheme: slate
      primary: blue
      accent: teal

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - assets/styles/mkdocs-theme.css

nav:
  - Home: index.md
  - Getting Started:
      - Deploy with Docker Compose: docker-compose.md
      - Customizing Lab Compose: lab-compose.md
      - Windows / WSL Notes: windows-wsl.md
      - Host Deploy Notes: deploy-host.md
  - Operations:
      - CLI: cli.md
      - Services: services.md
  - Architecture:
      - Overview: architecture.md
      - Dataplane: dataplane.md
      - Enforcement: dataplane-enforcement.md
      - eBPF: ebpf.md
  - Policy:
      - Policy Model: policy-model.md
      - ICS DPI: ics-dpi.md
      - IDS Rules: ids-rules.md
  - Reference:
      - Config Format: config-format.md
      - API Reference: api-reference.md
      - Audit Baseline: audit-baseline.md
  - Security:
      - Secure by Design: secure-by-design.md
      - Advisories and CSAF: advisories.md
      - Logging and Evidence: logging-evidence.md
      - Update Policy: update-policy.md
  - Supply Chain:
      - SBOM: sbom.md
      - Third-Party Licenses: SPDX.md
