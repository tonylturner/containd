<script>
(function () {
  function ensureAppLink() {
    var inner = document.querySelector(".md-header__inner");
    if (!inner) return;
    if (inner.querySelector(".md-header__link--app")) return;
    var link = document.createElement("a");
    link.href = "/";
    link.textContent = "Back to Firewall";
    link.className = "md-header__link md-header__link--app";
    var title = inner.querySelector(".md-header__title");
    if (title && title.parentNode) {
      title.parentNode.insertBefore(link, title);
    } else {
      inner.appendChild(link);
    }
  }

  if (typeof document$ !== "undefined" && document$.subscribe) {
    document$.subscribe(ensureAppLink);
  } else {
    document.addEventListener("DOMContentLoaded", ensureAppLink);
  }
})();
</script>
