# NOTE: After the first push, make the GHCR packages public so users can pull
# without authentication: repo → Packages → Package settings → Change visibility → Public.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # needed to attach SBOMs to GitHub releases
  packages: write
  id-token: write   # needed for Cosign keyless signing

env:
  REGISTRY: ghcr.io
  IMAGE_MGMT: ghcr.io/${{ github.repository }}
  IMAGE_ENGINE: ghcr.io/${{ github.repository }}-engine

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          file_version="$(tr -d '\n' < VERSION)"
          if [ "$tag_version" != "$file_version" ]; then
            echo "tag version $tag_version does not match VERSION file $file_version" >&2
            exit 1
          fi
          echo "version=$tag_version" >> "$GITHUB_OUTPUT"

      - name: Build and push mgmt image
        id: build-mgmt
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile.mgmt
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_MGMT }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_MGMT }}:latest
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push engine image
        id: build-engine
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile.engine
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_ENGINE }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_ENGINE }}:latest
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Cosign keyless signing (uses GitHub OIDC identity)
      - uses: sigstore/cosign-installer@v3

      - name: Sign mgmt image
        run: cosign sign --yes ${{ env.IMAGE_MGMT }}@${{ steps.build-mgmt.outputs.digest }}

      - name: Sign engine image
        run: cosign sign --yes ${{ env.IMAGE_ENGINE }}@${{ steps.build-engine.outputs.digest }}

      # SBOM generation with Syft (CycloneDX 1.6), attached to the signed images
      - uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_MGMT }}@${{ steps.build-mgmt.outputs.digest }}
          output-file: sbom-mgmt.cdx.json
          format: cyclonedx-json

      - uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_ENGINE }}@${{ steps.build-engine.outputs.digest }}
          output-file: sbom-engine.cdx.json
          format: cyclonedx-json

      - name: Attach SBOM to mgmt image
        run: cosign attach sbom --sbom sbom-mgmt.cdx.json ${{ env.IMAGE_MGMT }}@${{ steps.build-mgmt.outputs.digest }}

      - name: Attach SBOM to engine image
        run: cosign attach sbom --sbom sbom-engine.cdx.json ${{ env.IMAGE_ENGINE }}@${{ steps.build-engine.outputs.digest }}

      - name: Write release image manifest
        run: |
          cat > release-images.txt <<EOF
          mgmt_image=${{ env.IMAGE_MGMT }}:${{ steps.meta.outputs.version }}
          mgmt_digest=${{ steps.build-mgmt.outputs.digest }}
          engine_image=${{ env.IMAGE_ENGINE }}:${{ steps.meta.outputs.version }}
          engine_digest=${{ steps.build-engine.outputs.digest }}
          EOF

      - name: Extract release notes from CHANGELOG
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { in_section=1; next }
            in_section && /^## \[/ { exit }
            in_section { print }
          ' CHANGELOG.md | sed '/./,$!d' > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "missing CHANGELOG entry for ${version}" >&2
            exit 1
          fi

      - name: Package CSAF materials
        run: |
          set -euo pipefail
          mkdir -p release-csaf
          cp ui/public/.well-known/csaf/provider-metadata.json release-csaf/provider-metadata.json
          if ls security/csaf/advisories/*.json >/dev/null 2>&1; then
            cp security/csaf/advisories/*.json release-csaf/
          fi
          tar -czf csaf-documents.tgz -C release-csaf .

      - name: Upload SBOMs as release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: |
            sbom-mgmt.cdx.json
            sbom-engine.cdx.json
            release-images.txt
            csaf-documents.tgz

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          prerelease: ${{ contains(steps.meta.outputs.version, '-') }}
          files: |
            sbom-mgmt.cdx.json
            sbom-engine.cdx.json
            release-images.txt
            csaf-documents.tgz
