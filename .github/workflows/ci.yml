name: CI

on:
  push:
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Go test
        run: go test ./...

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install MkDocs deps
        run: pip install -r docs/requirements-mkdocs.txt
      - name: Build docs
        run: mkdocs build -f mkdocs.yml -d /tmp/containd-docs

  ui-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Install deps
        run: |
          cd ui
          npm ci
      - name: Lint UI
        run: |
          cd ui
          npm run lint
      - name: Build static UI
        run: |
          cd ui
          npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [go, docs, ui-lint]
    steps:
      - uses: actions/checkout@v4
      - name: Build mgmt image
        run: docker build -f Dockerfile.mgmt -t containd/containd:ci .
      - name: Build engine image
        run: docker build -f Dockerfile.engine -t containd/containd-engine:ci .
