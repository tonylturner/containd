name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify go.mod is tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: docs/requirements-mkdocs.txt
      - name: Install MkDocs deps
        run: pip install -r docs/requirements-mkdocs.txt
      - name: Build docs
        run: mkdocs build -f docs/mkdocs.yml -d /tmp/containd-docs

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Install deps
        run: npm ci
        working-directory: ui
      - name: Audit
        run: npm audit --omit=dev --audit-level=high || true
        working-directory: ui
      - name: Lint
        run: npm run lint
        working-directory: ui
      - name: Build
        run: npm run build
        working-directory: ui

  # Docker build + Trivy scan runs in parallel with other jobs (not gated).
  # It does its own full multi-stage build so doesn't need prior job outputs.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile.mgmt
          push: false
          load: true
          tags: containd/containd:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Quickstart smoke (public compose)
        env:
          COMPOSE_PROJECT_NAME: containd-quickstart-ci
          CONTAIND_IMAGE: containd/containd:ci
          CONTAIND_JWT_SECRET: ci-quickstart-secret
        run: |
          set -euo pipefail
          passed=0
          api="http://localhost:8080/api/v1"

          cleanup() {
            if [ "$passed" -ne 1 ]; then
              docker compose -f deploy/docker-compose.yml logs --no-color containd || true
            fi
            docker compose -f deploy/docker-compose.yml down -v || true
            rm -f /tmp/containd-quickstart.cookie
            rm -f /tmp/containd-quickstart-routing.json
          }
          trap cleanup EXIT

          docker compose -f deploy/docker-compose.yml up -d
          cid="$(docker compose -f deploy/docker-compose.yml ps -q containd)"
          if [ -z "$cid" ]; then
            echo "failed to resolve quickstart container id" >&2
            exit 1
          fi

          status=""
          for _ in $(seq 1 40); do
            status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$cid")"
            if [ "$status" = "healthy" ]; then
              break
            fi
            sleep 3
          done
          if [ "$status" != "healthy" ]; then
            echo "quickstart container never became healthy (status=$status)" >&2
            exit 1
          fi

          curl -fsS "$api/health" | jq -e '.status == "ok"' >/dev/null
          curl -fsS -c /tmp/containd-quickstart.cookie \
            -H 'Content-Type: application/json' \
            -d '{"username":"containd","password":"containd"}' \
            "$api/auth/login" >/dev/null
          curl -fsS -b /tmp/containd-quickstart.cookie \
            -H 'Content-Type: application/json' \
            -d '{"currentPassword":"containd","newPassword":"Containd2"}' \
            "$api/auth/me/password" >/dev/null
          curl -fsS -c /tmp/containd-quickstart.cookie \
            -H 'Content-Type: application/json' \
            -d '{"username":"containd","password":"Containd2"}' \
            "$api/auth/login" >/dev/null
          curl -fsS -b /tmp/containd-quickstart.cookie \
            -H 'Content-Type: application/json' \
            -d '{"mode":"auto"}' \
            "$api/interfaces/assign" | jq -e '.interfaces | type == "array" and length > 0' >/dev/null
          curl -fsS -b /tmp/containd-quickstart.cookie \
            -H 'Content-Type: application/json' \
            -X PATCH \
            -d '{"alias":"wan-ci"}' \
            "$api/interfaces/wan" | jq -e '.alias == "wan-ci"' >/dev/null
          curl -fsS -b /tmp/containd-quickstart.cookie \
            "$api/routing" > /tmp/containd-quickstart-routing.json
          curl -fsS -b /tmp/containd-quickstart.cookie \
            -H 'Content-Type: application/json' \
            -d @/tmp/containd-quickstart-routing.json \
            "$api/routing" | jq -e 'type == "object" and ((.gateways // []) | type == "array")' >/dev/null
          curl -fsS -b /tmp/containd-quickstart.cookie \
            "$api/interfaces/state" | jq -e 'type == "array" and length > 0' >/dev/null
          curl -fsS -b /tmp/containd-quickstart.cookie \
            "$api/flows?limit=5" | jq -e 'type == "array"' >/dev/null
          curl -fsS -b /tmp/containd-quickstart.cookie \
            "$api/stats/protocols" | jq -e 'type == "array"' >/dev/null
          curl -fsS -b /tmp/containd-quickstart.cookie \
            "$api/stats/top-talkers?n=5" | jq -e 'type == "array"' >/dev/null
          curl -fsS -b /tmp/containd-quickstart.cookie \
            "$api/conntrack?limit=5" | jq -e 'type == "array"' >/dev/null
          curl -fsS -b /tmp/containd-quickstart.cookie \
            "$api/anomalies?limit=5" | jq -e 'type == "array"' >/dev/null
          curl -fsS -b /tmp/containd-quickstart.cookie \
            "$api/inventory" | jq -e 'type == "array"' >/dev/null
          curl -fsS -b /tmp/containd-quickstart.cookie \
            "$api/learn/profiles" | jq -e 'type == "array"' >/dev/null
          curl -fsS -b /tmp/containd-quickstart.cookie \
            "$api/signatures" | jq -e 'type == "array"' >/dev/null
          curl -fsS -b /tmp/containd-quickstart.cookie \
            -H 'Content-Type: application/json' \
            -d '{"action":"start"}' \
            "$api/simulation" | jq -e '.running == true' >/dev/null
          curl -fsS -b /tmp/containd-quickstart.cookie \
            -H 'Content-Type: application/json' \
            -d '{"action":"stop"}' \
            "$api/simulation" | jq -e '.running == false' >/dev/null
          passed=1
      - name: Trivy vulnerability scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}/.trivyignore:/root/.trivyignore:ro \
            ghcr.io/aquasecurity/trivy:0.62.1 \
            image --exit-code 1 --severity HIGH,CRITICAL --ignorefile /root/.trivyignore --format table \
            containd/containd:ci
