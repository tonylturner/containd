name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify go.mod is tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: docs/requirements-mkdocs.txt
      - name: Install MkDocs deps
        run: pip install -r docs/requirements-mkdocs.txt
      - name: Build docs
        run: mkdocs build -f docs/mkdocs.yml -d /tmp/containd-docs

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Install deps
        run: npm ci
        working-directory: ui
      - name: Audit
        run: npm audit --omit=dev --audit-level=high || true
        working-directory: ui
      - name: Lint
        run: npm run lint
        working-directory: ui
      - name: Build
        run: npm run build
        working-directory: ui

  # Docker build + Trivy scan runs in parallel with other jobs (not gated).
  # It does its own full multi-stage build so doesn't need prior job outputs.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile.mgmt
          push: false
          load: true
          tags: containd/containd:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy vulnerability scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}/.trivyignore:/root/.trivyignore:ro \
            ghcr.io/aquasecurity/trivy:0.62.1 \
            image --exit-code 1 --severity HIGH,CRITICAL --ignorefile /root/.trivyignore --format table \
            containd/containd:ci
