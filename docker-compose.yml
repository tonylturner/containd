services:
  containd:
    build:
      context: .
      dockerfile: Dockerfile.mgmt
    image: containd/containd:dev
    # Run mgmt/UI in the same network namespace as the engine so interface/IP
    # mapping matches what the dataplane sees. This avoids confusion where
    # the UI shows engine interface state but diagnostics originate from a
    # different container IP.
    network_mode: "service:engine"
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BIND_SERVICE
    environment:
      # Management listeners
      - NGFW_MGMT_ADDR=${CONTAIND_MGMT_HTTP_ADDR:-:8080}
      - NGFW_MGMT_HTTPS_ADDR=${CONTAIND_MGMT_HTTPS_ADDR:-:8443}

      # Persist config/audit/users DBs on the /data volume
      - NGFW_CONFIG_DB=${CONTAIND_CONFIG_DB:-/data/config.db}
      - NGFW_AUDIT_DB=${CONTAIND_AUDIT_DB:-/data/audit.db}
      - NGFW_USERS_DB=${CONTAIND_USERS_DB:-/data/users.db}

      # SSH
      - NGFW_SSH_ADDR=${CONTAIND_SSH_ADDR:-:2222}
      - NGFW_SSH_AUTH_KEYS_DIR=${CONTAIND_SSH_AUTH_KEYS_DIR:-/data/ssh/authorized_keys.d}
      - NGFW_SSH_HOST_KEY=${CONTAIND_SSH_HOST_KEY:-/data/ssh/host_key}

      # Optional: seed initial admin SSH key (avoid chicken/egg in production).
      # Set to a full authorized_keys line, e.g. "ssh-ed25519 AAAA... user@host".
      - NGFW_SSH_BOOTSTRAP_ADMIN_KEY=${CONTAIND_SSH_BOOTSTRAP_ADMIN_KEY:-}
      - NGFW_SSH_BOOTSTRAP_ADMIN_USER=${CONTAIND_SSH_BOOTSTRAP_ADMIN_USER:-containd}
      # Optional: override password auth (default enabled only in lab mode).
      # - NGFW_SSH_ALLOW_PASSWORD=0
      # Bootstrap SSH password auth: if no authorized keys exist yet, ssh password auth is enabled automatically.
      # To force-enable or force-disable, set NGFW_SSH_ALLOW_PASSWORD explicitly.
      # - NGFW_SSH_ALLOW_PASSWORD=1

      # Auth + session cookie behavior
      - CONTAIND_JWT_SECRET=${CONTAIND_JWT_SECRET:-containd-dev-secret-change-me}
      - CONTAIND_COOKIE_SECURE=${CONTAIND_COOKIE_SECURE:-0}
      - CONTAIND_TRUSTED_PROXIES=${CONTAIND_TRUSTED_PROXIES:-}
      # Default admin provisioned on fresh installs (users DB empty).
      - CONTAIND_DEFAULT_ADMIN_USERNAME=${CONTAIND_DEFAULT_ADMIN_USERNAME:-}
      - CONTAIND_DEFAULT_ADMIN_PASSWORD=${CONTAIND_DEFAULT_ADMIN_PASSWORD:-}

      # Optional: point mgmt at a separate engine service.
      - NGFW_ENGINE_URL=${CONTAIND_ENGINE_URL:-http://127.0.0.1:8081}
    volumes:
      - ./data:/data
    # OpenVPN requires a TUN device when enabled.
    devices:
      - /dev/net/tun:/dev/net/tun
    command: ["/usr/bin/ngfw-mgmt"]
    depends_on:
      - engine

  engine:
    build:
      context: .
      dockerfile: Dockerfile.engine
    image: containd/containd-engine:dev
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BIND_SERVICE
    environment:
      - NGFW_ENGINE_ADDR=${CONTAIND_ENGINE_ADDR:-:8081}
      # Comma-separated list of interfaces to capture on (empty is allowed for now).
      - NGFW_CAPTURE_IFACES=${CONTAIND_CAPTURE_IFACES:-}
      # Enable nftables enforcement when running privileged.
      - NGFW_ENFORCE_ENABLED=${CONTAIND_ENFORCE_ENABLED:-0}
    ports:
      - "${CONTAIND_PUBLISH_HTTP_PORT:-8080}:8080"
      - "${CONTAIND_PUBLISH_HTTPS_PORT:-8443}:8443"
      - "${CONTAIND_PUBLISH_SSH_PORT:-2222}:2222"
      - "${CONTAIND_PUBLISH_ENGINE_PORT:-8081}:8081"
    volumes:
      # Persist DHCP leases and other engine state that must survive container restarts.
      - ./data:/data
    command: ["/usr/bin/ngfw-engine"]
    # Attach engine to all appliance networks; eth0..eth7 correspond to wan/dmz/lan1..lan6.
    networks:
      wan:
        ipv4_address: 192.168.240.2
        # Ensure Docker chooses WAN as the default gateway network.
        gw_priority: 100
        priority: 1000
        interface_name: eth0
      dmz:
        ipv4_address: 192.168.241.2
        gw_priority: 0
        priority: 900
        interface_name: eth1
      lan1:
        ipv4_address: 192.168.242.2
        gw_priority: 0
        priority: 800
        interface_name: eth2
      lan2:
        ipv4_address: 192.168.243.2
        gw_priority: 0
        priority: 700
        interface_name: eth3
      lan3:
        ipv4_address: 192.168.244.2
        gw_priority: 0
        priority: 600
        interface_name: eth4
      lan4:
        ipv4_address: 192.168.245.2
        gw_priority: 0
        priority: 500
        interface_name: eth5
      lan5:
        ipv4_address: 192.168.246.2
        gw_priority: 0
        priority: 400
        interface_name: eth6
      lan6:
        ipv4_address: 192.168.247.2
        gw_priority: 0
        priority: 300
        interface_name: eth7

networks:
  wan:
    ipam:
      config:
        - subnet: 192.168.240.0/24
  dmz:
    ipam:
      config:
        - subnet: 192.168.241.0/24
  lan1:
    ipam:
      config:
        - subnet: 192.168.242.0/24
  lan2:
    ipam:
      config:
        - subnet: 192.168.243.0/24
  lan3:
    ipam:
      config:
        - subnet: 192.168.244.0/24
  lan4:
    ipam:
      config:
        - subnet: 192.168.245.0/24
  lan5:
    ipam:
      config:
        - subnet: 192.168.246.0/24
  lan6:
    ipam:
      config:
        - subnet: 192.168.247.0/24
