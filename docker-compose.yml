# containd — local development compose
# This file builds from source and creates simulated zone networks.
# For production deployment, see deploy/docker-compose.yml.
#
# ── Production hardening (uncomment when deploying for real) ────
# See deploy/docker-compose.yml for the full list. Key additions:
#   mem_limit: 512m
#   pids_limit: 256
#   read_only: true  (+ tmpfs for /tmp, /run)
#   security_opt: [no-new-privileges:true]
#   logging: { driver: json-file, options: { max-size: "50m", max-file: "5" } }

services:
  containd:
    build:
      context: .
      dockerfile: Dockerfile.mgmt
    image: containd/containd:dev
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BIND_SERVICE
    environment:
      - CONTAIND_MODE=${CONTAIND_MODE:-all}
      # Management listeners
      - CONTAIND_MGMT_ADDR=${CONTAIND_MGMT_HTTP_ADDR:-:8080}
      - CONTAIND_MGMT_HTTPS_ADDR=${CONTAIND_MGMT_HTTPS_ADDR:-:8443}
      - CONTAIND_ENGINE_URL=${CONTAIND_ENGINE_URL:-http://127.0.0.1:8081}

      # Engine runtime
      - CONTAIND_ENGINE_ADDR=${CONTAIND_ENGINE_ADDR:-:8081}
      - CONTAIND_CAPTURE_IFACES=${CONTAIND_CAPTURE_IFACES:-}
      - CONTAIND_ENFORCE_ENABLED=${CONTAIND_ENFORCE_ENABLED:-0}

      # Persist config/audit/users DBs on the /data volume
      - CONTAIND_CONFIG_DB=${CONTAIND_CONFIG_DB:-/data/config.db}
      - CONTAIND_AUDIT_DB=${CONTAIND_AUDIT_DB:-/data/audit.db}
      - CONTAIND_USERS_DB=${CONTAIND_USERS_DB:-/data/users.db}

      # SSH
      - CONTAIND_SSH_ADDR=${CONTAIND_SSH_ADDR:-:2222}
      - CONTAIND_SSH_AUTH_KEYS_DIR=${CONTAIND_SSH_AUTH_KEYS_DIR:-/data/ssh/authorized_keys.d}
      - CONTAIND_SSH_HOST_KEY=${CONTAIND_SSH_HOST_KEY:-/data/ssh/host_key}
      - CONTAIND_SSH_BOOTSTRAP_ADMIN_KEY=${CONTAIND_SSH_BOOTSTRAP_ADMIN_KEY:-}
      - CONTAIND_SSH_BOOTSTRAP_ADMIN_USER=${CONTAIND_SSH_BOOTSTRAP_ADMIN_USER:-containd}
      # Optional: override password auth (default enabled only in lab mode).
      # - CONTAIND_SSH_ALLOW_PASSWORD=0

      # Auth + session cookie behavior
      - CONTAIND_LAB_MODE=${CONTAIND_LAB_MODE:-0}
      - CONTAIND_JWT_SECRET=${CONTAIND_JWT_SECRET:?Set CONTAIND_JWT_SECRET to a random 32+ character string}
      - CONTAIND_COOKIE_SECURE=${CONTAIND_COOKIE_SECURE:-0}
      - CONTAIND_TRUSTED_PROXIES=${CONTAIND_TRUSTED_PROXIES:-}
      - CONTAIND_DEFAULT_ADMIN_USERNAME=${CONTAIND_DEFAULT_ADMIN_USERNAME:-}
      - CONTAIND_DEFAULT_ADMIN_PASSWORD=${CONTAIND_DEFAULT_ADMIN_PASSWORD:-}
      - CONTAIND_DPI_MOCK=${CONTAIND_DPI_MOCK:-0}
    ports:
      - "${CONTAIND_PUBLISH_HTTP_PORT:-8080}:8080"
      - "${CONTAIND_PUBLISH_HTTPS_PORT:-8443}:8443"
      - "${CONTAIND_PUBLISH_SSH_PORT:-2222}:2222"
      # Optional: publish the engine API to the host for external diagnostics.
      # Uncomment and set CONTAIND_PUBLISH_ENGINE_PORT if needed.
      # - "${CONTAIND_PUBLISH_ENGINE_PORT:-8081}:8081"
    volumes:
      - ./data:/data
    devices:
      - /dev/net/tun:/dev/net/tun
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/containd", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Default: run combined mgmt+engine. Override with ["mgmt"] or ["engine"] if desired.
    command: ["all"]
    networks:
      wan:
        ipv4_address: 192.168.240.2
        gw_priority: 100
        priority: 1000
        interface_name: eth0
      dmz:
        ipv4_address: 192.168.241.2
        gw_priority: 0
        priority: 900
        interface_name: eth1
      lan1:
        ipv4_address: 192.168.242.2
        gw_priority: 0
        priority: 800
        interface_name: eth2
      lan2:
        ipv4_address: 192.168.243.2
        gw_priority: 0
        priority: 700
        interface_name: eth3
      lan3:
        ipv4_address: 192.168.244.2
        gw_priority: 0
        priority: 600
        interface_name: eth4
      lan4:
        ipv4_address: 192.168.245.2
        gw_priority: 0
        priority: 500
        interface_name: eth5
      lan5:
        ipv4_address: 192.168.246.2
        gw_priority: 0
        priority: 400
        interface_name: eth6
      lan6:
        ipv4_address: 192.168.247.2
        gw_priority: 0
        priority: 300
        interface_name: eth7

networks:
  wan:
    ipam:
      config:
        - subnet: 192.168.240.0/24
  dmz:
    ipam:
      config:
        - subnet: 192.168.241.0/24
  lan1:
    ipam:
      config:
        - subnet: 192.168.242.0/24
  lan2:
    ipam:
      config:
        - subnet: 192.168.243.0/24
  lan3:
    ipam:
      config:
        - subnet: 192.168.244.0/24
  lan4:
    ipam:
      config:
        - subnet: 192.168.245.0/24
  lan5:
    ipam:
      config:
        - subnet: 192.168.246.0/24
  lan6:
    ipam:
      config:
        - subnet: 192.168.247.0/24
