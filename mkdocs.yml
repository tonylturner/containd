site_name: containd
site_url: ""
repo_url: ""

docs_dir: docs/mkdocs
site_dir: site

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
  palette:
    - scheme: slate
      primary: teal
      accent: teal

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Getting Started:
      - Deploy with Docker Compose: docker-compose.md
      - Host Deploy Notes: deploy-host.md
  - Operations:
      - CLI: cli.md
      - Services: services.md
  - Architecture:
      - Overview: architecture.md
      - Dataplane: dataplane.md
      - Enforcement: dataplane-enforcement.md
      - eBPF: ebpf.md
  - Policy:
      - Policy Model: policy-model.md
      - ICS DPI: ics-dpi.md
      - IDS Rules: ids-rules.md
  - Reference:
      - Config Format: config-format.md
      - SPDX: SPDX.md
