version: "2"

linters:
  default: standard
  disable:
    - cyclop
    - depguard
    - exhaustive
    - exhaustruct
    - funlen
    - gochecknoglobals
    - godox
    - lll
    - mnd
    - nlreturn
    - wsl
  settings:
    errcheck:
      check-type-assertions: false
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - os.RemoveAll
        - (io.Closer).Close
        - (*os.File).Close
        - (*database/sql.Rows).Close
        - (*database/sql.DB).Close
        - (net.Conn).Close
        - (net.Listener).Close
        - (net.PacketConn).Close
        - golang.org/x/sys/unix.Close
    staticcheck:
      checks:
        - "all"
        - "-QF*"
        - "-ST1000"
  exclusions:
    rules:
      - linters: [errcheck]
        text: "Close"
      - linters: [errcheck]
        text: "resp.Body"
      - linters: [errcheck]
        path: _test\.go
      - linters: [staticcheck]
        text: "S1009"
      - linters: [staticcheck]
        text: "S1024"
      - linters: [staticcheck]
        text: "ST1003"
      - linters: [unused]
        path: "_stub\\.go$|_other\\.go$"
