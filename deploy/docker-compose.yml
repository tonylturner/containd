# containd — starter lab compose
# Usage:
#   curl -O https://raw.githubusercontent.com/tonylturner/containd/main/deploy/docker-compose.yml
#   curl -o .env https://raw.githubusercontent.com/tonylturner/containd/main/.env.example
#   # Edit .env and set a real CONTAIND_JWT_SECRET before starting
#   docker compose up -d
#
# Web UI:  http://localhost:8080
# HTTPS:   https://localhost:8443
# SSH CLI: ssh -p 2222 containd@localhost
# Default credentials: containd / containd (change on first login)
#
# This starter topology gives containd eight Docker-managed interfaces:
#   WAN  -> eth0 -> 192.168.240.2/24
#   DMZ  -> eth1 -> 192.168.241.2/24
#   LAN1 -> eth2 -> 192.168.242.2/24
#   LAN2 -> eth3 -> 192.168.243.2/24
#   LAN3 -> eth4 -> 192.168.244.2/24
#   LAN4 -> eth5 -> 192.168.245.2/24
#   LAN5 -> eth6 -> 192.168.246.2/24
#   LAN6 -> eth7 -> 192.168.247.2/24
#
# Edit the subnet/IP variables in .env to match your lab. Docker/Compose owns
# the available interfaces and Docker-level IP wiring; containd owns zone
# binding, firewall policy, services, and segmentation inside that topology.
#
# ──────────────────────────────────────────────────────────────────
# PRODUCTION HARDENING
# ──────────────────────────────────────────────────────────────────
# The defaults below are tuned for a lab starter. For real deployments:
#
#   1. Set a strong random JWT secret:
#        CONTAIND_JWT_SECRET=$(openssl rand -hex 32)
#
#   2. Force HTTPS-only session cookies when you terminate TLS:
#        CONTAIND_COOKIE_SECURE=1
#
#   3. Add resource limits:
#        mem_limit, cpus, pids_limit
#
#   4. Consider read-only rootfs + tmpfs:
#        read_only: true
#        tmpfs: [/tmp, /run]
#
#   5. Prevent privilege escalation:
#        security_opt: [no-new-privileges:true]
#
#   6. Limit container log growth:
#        logging: { driver: json-file, options: { max-size: "50m", max-file: "5" } }
# ──────────────────────────────────────────────────────────────────

services:
  containd:
    image: ${CONTAIND_IMAGE:-ghcr.io/tonylturner/containd:latest}
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BIND_SERVICE
    environment:
      - CONTAIND_MODE=${CONTAIND_MODE:-all}
      - CONTAIND_MGMT_ADDR=${CONTAIND_MGMT_HTTP_ADDR:-:8080}
      - CONTAIND_MGMT_HTTPS_ADDR=${CONTAIND_MGMT_HTTPS_ADDR:-:8443}
      - CONTAIND_ENGINE_URL=${CONTAIND_ENGINE_URL:-http://127.0.0.1:8081}
      - CONTAIND_ENGINE_ADDR=${CONTAIND_ENGINE_ADDR:-:8081}
      - CONTAIND_CAPTURE_IFACES=${CONTAIND_CAPTURE_IFACES:-}
      - CONTAIND_ENFORCE_ENABLED=${CONTAIND_ENFORCE_ENABLED:-0}
      - CONTAIND_CONFIG_DB=${CONTAIND_CONFIG_DB:-/data/config.db}
      - CONTAIND_AUDIT_DB=${CONTAIND_AUDIT_DB:-/data/audit.db}
      - CONTAIND_USERS_DB=${CONTAIND_USERS_DB:-/data/users.db}
      - CONTAIND_SSH_ADDR=${CONTAIND_SSH_ADDR:-:2222}
      - CONTAIND_SSH_AUTH_KEYS_DIR=${CONTAIND_SSH_AUTH_KEYS_DIR:-/data/ssh/authorized_keys.d}
      - CONTAIND_SSH_HOST_KEY=${CONTAIND_SSH_HOST_KEY:-/data/ssh/host_key}
      - CONTAIND_SSH_BOOTSTRAP_ADMIN_KEY=${CONTAIND_SSH_BOOTSTRAP_ADMIN_KEY:-}
      - CONTAIND_SSH_BOOTSTRAP_ADMIN_USER=${CONTAIND_SSH_BOOTSTRAP_ADMIN_USER:-containd}
      - CONTAIND_LAB_MODE=${CONTAIND_LAB_MODE:-0}
      - CONTAIND_JWT_SECRET=${CONTAIND_JWT_SECRET:?Set CONTAIND_JWT_SECRET to a random 32+ character string}
      - CONTAIND_COOKIE_SECURE=${CONTAIND_COOKIE_SECURE:-0}
      - CONTAIND_TRUSTED_PROXIES=${CONTAIND_TRUSTED_PROXIES:-}
      - CONTAIND_DEFAULT_ADMIN_USERNAME=${CONTAIND_DEFAULT_ADMIN_USERNAME:-}
      - CONTAIND_DEFAULT_ADMIN_PASSWORD=${CONTAIND_DEFAULT_ADMIN_PASSWORD:-}
    ports:
      - "${CONTAIND_PUBLISH_HTTP_PORT:-8080}:8080"
      - "${CONTAIND_PUBLISH_HTTPS_PORT:-8443}:8443"
      - "${CONTAIND_PUBLISH_SSH_PORT:-2222}:2222"
      # Optional: publish the engine API for external diagnostics.
      # - "${CONTAIND_PUBLISH_ENGINE_PORT:-8081}:8081"
    volumes:
      - ./data:/data
    devices:
      - /dev/net/tun:/dev/net/tun
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/bin/containd", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: ["all"]

    # [PROD] Resource and filesystem hardening
    # mem_limit: 512m
    # memswap_limit: 512m
    # cpus: 1.0
    # pids_limit: 256
    # read_only: true
    # tmpfs:
    #   - /tmp:size=64m
    #   - /run:size=64m
    # security_opt:
    #   - no-new-privileges:true
    # logging:
    #   driver: json-file
    #   options:
    #     max-size: "50m"
    #     max-file: "5"

    networks:
      wan:
        ipv4_address: ${CONTAIND_WAN_IP:-192.168.240.2}
        gw_priority: 100
        priority: 1000
        interface_name: eth0
      dmz:
        ipv4_address: ${CONTAIND_DMZ_IP:-192.168.241.2}
        gw_priority: 0
        priority: 900
        interface_name: eth1
      lan1:
        ipv4_address: ${CONTAIND_LAN1_IP:-192.168.242.2}
        gw_priority: 0
        priority: 800
        interface_name: eth2
      lan2:
        ipv4_address: ${CONTAIND_LAN2_IP:-192.168.243.2}
        gw_priority: 0
        priority: 700
        interface_name: eth3
      lan3:
        ipv4_address: ${CONTAIND_LAN3_IP:-192.168.244.2}
        gw_priority: 0
        priority: 600
        interface_name: eth4
      lan4:
        ipv4_address: ${CONTAIND_LAN4_IP:-192.168.245.2}
        gw_priority: 0
        priority: 500
        interface_name: eth5
      lan5:
        ipv4_address: ${CONTAIND_LAN5_IP:-192.168.246.2}
        gw_priority: 0
        priority: 400
        interface_name: eth6
      lan6:
        ipv4_address: ${CONTAIND_LAN6_IP:-192.168.247.2}
        gw_priority: 0
        priority: 300
        interface_name: eth7

networks:
  wan:
    driver: bridge
    ipam:
      config:
        - subnet: ${CONTAIND_WAN_SUBNET:-192.168.240.0/24}
  dmz:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: ${CONTAIND_DMZ_SUBNET:-192.168.241.0/24}
  lan1:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: ${CONTAIND_LAN1_SUBNET:-192.168.242.0/24}
  lan2:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: ${CONTAIND_LAN2_SUBNET:-192.168.243.0/24}
  lan3:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: ${CONTAIND_LAN3_SUBNET:-192.168.244.0/24}
  lan4:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: ${CONTAIND_LAN4_SUBNET:-192.168.245.0/24}
  lan5:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: ${CONTAIND_LAN5_SUBNET:-192.168.246.0/24}
  lan6:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: ${CONTAIND_LAN6_SUBNET:-192.168.247.0/24}
