<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>containd UI placeholder</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", "Inter", "Segoe UI", system-ui, sans-serif;
        background: radial-gradient(circle at 20% 20%, rgba(6, 182, 212, 0.08), transparent 30%),
          radial-gradient(circle at 80% 0%, rgba(251, 191, 36, 0.12), transparent 30%), #121212;
        color: #ffffff;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 2rem;
      }
      .card {
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        border-radius: 16px;
        padding: 24px;
        max-width: 640px;
      }
      code {
        background: rgba(255, 255, 255, 0.08);
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>containd UI build not generated yet</h1>
      <p>
        The management API is running. Generate the Next.js build in
        <code>ui/</code> or run <code>npm run dev</code> from that directory to
        start the app.
      </p>
    </div>
  </body>
 </html>
