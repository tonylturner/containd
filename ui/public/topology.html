<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>containd — Topology</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --amber: #f59e0b;
  --amber-dim: #78490a;
  --amber-glow: rgba(245,158,11,0.12);
  --green: #22c55e;
  --green-dim: #14532d;
  --red: #ef4444;
  --red-dim: #7f1d1d;
  --cyan: #06b6d4;
  --cyan-dim: #164e63;
  --purple: #a855f7;
  --purple-dim: #3b0764;
  --blue: #3b82f6;
  --bg: #060808;
  --surface: #0a0e0a;
  --surface2: #0e130e;
  --border: rgba(245,158,11,0.14);
  --text: #e8d5a3;
  --text-dim: #4a4030;
  --text-mid: #8a7a5a;
  --mono: 'Share Tech Mono', monospace;
  --display: 'Orbitron', monospace;
  --ui: 'Rajdhani', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--ui);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  user-select: none;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.035) 2px,rgba(0,0,0,0.035) 4px);
  pointer-events:none; z-index:9999;
}

/* ── TOPBAR ── */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink:0; z-index:100;
}
.topbar-left { display:flex; align-items:center; gap:16px; }
.logo { font-family:var(--display); font-size:12px; font-weight:700; color:var(--amber); letter-spacing:3px; }
.breadcrumb { font-family:var(--mono); font-size:9px; color:var(--text-dim); letter-spacing:2px; }
.breadcrumb span { color:var(--text-mid); }

.view-tabs { display:flex; gap:2px; }
.tab {
  padding:4px 12px; font-family:var(--mono); font-size:9px; letter-spacing:2px;
  border:1px solid var(--border); background:transparent; color:var(--text-dim);
  cursor:pointer; transition:all .15s; text-transform:uppercase;
}
.tab:hover { color:var(--text); border-color:rgba(245,158,11,0.3); }
.tab.active { background:var(--amber-glow); border-color:var(--amber); color:var(--amber); }

.topbar-right { display:flex; align-items:center; gap:12px; font-family:var(--mono); font-size:10px; }

.status-chip {
  display:flex; align-items:center; gap:5px;
  padding:3px 10px; border:1px solid var(--border);
  font-size:9px; letter-spacing:1px;
}
.chip-dot { width:5px; height:5px; border-radius:50%; }

.icon-btn {
  width:28px; height:28px; border:1px solid var(--border);
  background:transparent; color:var(--text-dim);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .15s; font-size:12px;
}
.icon-btn:hover { border-color:var(--amber); color:var(--amber); }

/* ── LAYOUT ── */
.workspace {
  display:grid;
  grid-template-columns: 1fr 280px;
  flex:1;
  overflow:hidden;
}

/* ── CANVAS ── */
.canvas-wrap {
  position:relative; overflow:hidden;
  background: var(--bg);
  cursor: grab;
}
.canvas-wrap.dragging { cursor:grabbing; }

#bgCanvas, #edgeCanvas, #nodeCanvas {
  position:absolute; inset:0; width:100%; height:100%;
}
#nodeCanvas { z-index:3; pointer-events:none; }
#edgeCanvas { z-index:2; }
#bgCanvas   { z-index:1; }

/* DOM nodes rendered on top for interactivity */
.nodes-layer {
  position:absolute; inset:0;
  z-index:4;
  pointer-events:none;
}

.node {
  position:absolute;
  pointer-events:all;
  cursor:pointer;
  transform: translate(-50%, -50%);
  transition: filter .2s;
}
.node:hover { z-index:10; }

.node-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  min-width: 130px;
  position:relative;
  overflow:hidden;
  transition: border-color .2s, box-shadow .2s;
}
.node:hover .node-card,
.node.selected .node-card {
  border-color: rgba(245,158,11,0.6);
  box-shadow: 0 0 16px rgba(245,158,11,0.15);
}

/* type-specific accent top border */
.node-card::before {
  content:'';
  position:absolute; top:0; left:0; right:0;
  height:2px;
}
.node[data-type="firewall"] .node-card::before { background: var(--amber); }
.node[data-type="gateway"]  .node-card::before { background: var(--cyan); }
.node[data-type="zone"]     .node-card::before { background: var(--green); }
.node[data-type="zone"][data-status="warn"] .node-card::before { background: var(--amber); }
.node[data-type="zone"][data-status="crit"] .node-card::before { background: var(--red); }
.node[data-type="interface"].node-card::before { background: var(--purple); }
.node[data-type="internet"]  .node-card::before { background: #6b7280; }

.node-header {
  display:flex; align-items:center; gap:6px;
  padding:6px 8px 4px;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.node-icon { font-size:11px; flex-shrink:0; }
.node-name {
  font-family:var(--display); font-size:9px; font-weight:700;
  letter-spacing:1.5px; white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis; flex:1;
}
.node[data-type="firewall"] .node-name { color:var(--amber); }
.node[data-type="gateway"]  .node-name { color:var(--cyan); }
.node[data-type="zone"]     .node-name { color:var(--green); }
.node[data-type="zone"][data-status="warn"] .node-name { color:var(--amber); }
.node[data-type="zone"][data-status="crit"] .node-name { color:var(--red); }
.node[data-type="internet"]  .node-name { color:#9ca3af; }
.node[data-type="interface"] .node-name { color:var(--purple); }

.node-status-dot {
  width:5px; height:5px; border-radius:50%; flex-shrink:0;
}

.node-body { padding:5px 8px 7px; display:flex; flex-direction:column; gap:3px; }

.node-row {
  display:flex; justify-content:space-between; gap:8px;
  font-family:var(--mono); font-size:8px; line-height:1.4;
}
.node-row-key { color:var(--text-dim); }
.node-row-val { color:var(--text-mid); text-align:right; }

.node-sparkline {
  display:flex; gap:1px; align-items:flex-end;
  height:14px; margin-top:4px;
}
.spark { flex:1; border-radius:1px 1px 0 0; min-width:2px; opacity:.7; }

/* traffic badge */
.traffic-badge {
  position:absolute; bottom:-8px; left:50%; transform:translateX(-50%);
  background:var(--surface); border:1px solid var(--border);
  padding:1px 6px; font-family:var(--mono); font-size:8px;
  color:var(--text-dim); white-space:nowrap;
  pointer-events:none;
}

/* ── MINI LEGEND on canvas ── */
.canvas-legend {
  position:absolute; bottom:16px; left:16px;
  display:flex; flex-direction:column; gap:5px;
  font-family:var(--mono); font-size:9px; color:var(--text-dim);
  background:rgba(6,8,8,0.85); border:1px solid var(--border);
  padding:10px 12px; pointer-events:none;
}
.legend-item { display:flex; align-items:center; gap:7px; }
.legend-line { width:20px; height:2px; border-radius:1px; }

/* ── ZOOM CONTROLS ── */
.zoom-controls {
  position:absolute; bottom:16px; right:16px;
  display:flex; flex-direction:column; gap:4px;
}
.zoom-btn {
  width:28px; height:28px; background:var(--surface2);
  border:1px solid var(--border); color:var(--text-mid);
  font-size:14px; cursor:pointer; transition:all .15s;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--mono);
}
.zoom-btn:hover { border-color:var(--amber); color:var(--amber); }

/* ── DETAIL PANEL ── */
.detail-panel {
  background:var(--surface);
  border-left:1px solid var(--border);
  display:flex; flex-direction:column;
  overflow:hidden;
}

.panel-header {
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.panel-title {
  font-family:var(--display); font-size:10px; letter-spacing:2px; color:var(--amber);
}
.panel-close {
  font-family:var(--mono); font-size:10px; color:var(--text-dim);
  cursor:pointer; padding:2px 6px; border:1px solid transparent;
  transition:all .15s;
}
.panel-close:hover { border-color:var(--border); color:var(--text); }

.panel-body { flex:1; overflow-y:auto; padding:0; }
.panel-body::-webkit-scrollbar { width:3px; }
.panel-body::-webkit-scrollbar-thumb { background:var(--amber-dim); }

.panel-section {
  padding:12px 16px;
  border-bottom:1px solid var(--border);
}
.panel-section:last-child { border-bottom:none; }

.panel-section-label {
  font-family:var(--mono); font-size:8px; letter-spacing:3px;
  color:var(--text-dim); text-transform:uppercase; margin-bottom:8px;
  display:flex; align-items:center; gap:8px;
}
.panel-section-label::after {
  content:''; flex:1; height:1px; background:var(--border);
}

.detail-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:4px 0; font-family:var(--mono); font-size:10px;
  border-bottom:1px solid rgba(255,255,255,0.03);
}
.detail-row:last-child { border-bottom:none; }
.detail-key { color:var(--text-dim); }
.detail-val { color:var(--text); text-align:right; }
.detail-val.green { color:var(--green); }
.detail-val.amber { color:var(--amber); }
.detail-val.red   { color:var(--red); }
.detail-val.cyan  { color:var(--cyan); }

.iface-list { display:flex; flex-direction:column; gap:4px; }
.iface-item {
  background:var(--surface2); border:1px solid var(--border);
  padding:6px 10px;
}
.iface-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:3px; }
.iface-name { font-family:var(--display); font-size:9px; letter-spacing:1px; color:var(--purple); }
.iface-state {
  font-family:var(--mono); font-size:8px; padding:1px 5px;
  border-radius:1px;
}
.iface-state.up   { background:var(--green-dim); color:var(--green); }
.iface-state.down { background:var(--red-dim); color:var(--red); }
.iface-ip { font-family:var(--mono); font-size:9px; color:var(--text-mid); }
.iface-stats { display:flex; gap:12px; margin-top:3px; font-family:var(--mono); font-size:8px; color:var(--text-dim); }

.route-table { width:100%; border-collapse:collapse; font-family:var(--mono); font-size:9px; }
.route-table th {
  text-align:left; color:var(--text-dim); letter-spacing:1px;
  padding:3px 6px; border-bottom:1px solid var(--border);
  font-weight:400;
}
.route-table td { padding:4px 6px; border-bottom:1px solid rgba(255,255,255,0.03); color:var(--text-mid); }
.route-table tr:hover td { background:rgba(245,158,11,0.03); }
.route-origin { font-size:8px; padding:1px 4px; border-radius:1px; }
.origin-static  { background:#1c1c2e; color:#7c73e6; }
.origin-dynamic { background:var(--cyan-dim); color:var(--cyan); }
.origin-local   { background:var(--green-dim); color:var(--green); }

.rule-list { display:flex; flex-direction:column; gap:3px; }
.rule-item {
  display:flex; align-items:center; gap:8px;
  padding:5px 8px; background:var(--surface2);
  border-left:2px solid transparent; font-family:var(--mono); font-size:9px;
}
.rule-item.allow { border-left-color:var(--green); }
.rule-item.deny  { border-left-color:var(--red); }
.rule-action { font-size:8px; padding:1px 5px; border-radius:1px; }
.rule-item.allow .rule-action { background:var(--green-dim); color:var(--green); }
.rule-item.deny  .rule-action { background:var(--red-dim); color:var(--red); }
.rule-desc { flex:1; color:var(--text-mid); }
.rule-hits { color:var(--text-dim); }

/* empty panel state */
.panel-empty {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
  color:var(--text-dim); font-family:var(--mono); font-size:10px;
  padding:24px; text-align:center;
}
.panel-empty-icon { font-size:28px; opacity:.3; }

/* ── OVERLAY BADGES ── */
.bandwidth-label {
  position:absolute; font-family:var(--mono); font-size:8px;
  color:rgba(245,158,11,0.5); pointer-events:none; z-index:5;
  white-space:nowrap;
}

@keyframes fadeIn {
  from { opacity:0; transform:translate(-50%,-52%); }
  to   { opacity:1; transform:translate(-50%,-50%); }
}
.node { animation: fadeIn .4s ease both; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <span class="logo">CONTAIND</span>
    <span class="breadcrumb">MONITORING <span>›</span> TOPOLOGY</span>
  </div>
  <div class="view-tabs">
    <button class="tab active" onclick="setView('logical',this)">LOGICAL</button>
    <button class="tab" onclick="setView('physical',this)">PHYSICAL</button>
    <button class="tab" onclick="setView('security',this)">SECURITY</button>
  </div>
  <div class="topbar-right">
    <div class="status-chip">
      <div class="chip-dot" style="background:var(--green);box-shadow:0 0 6px var(--green)"></div>
      <span style="font-family:var(--mono);font-size:9px;color:var(--green)">ALL NOMINAL</span>
    </div>
    <div class="status-chip">
      <span style="color:var(--text-dim)">LAST SYNC</span>
      <span id="syncTime" style="color:var(--amber)">—</span>
    </div>
    <button class="icon-btn" title="Fit to screen" onclick="fitView()">⤢</button>
    <button class="icon-btn" title="Refresh" onclick="fetchConfig().then(rebuildFromConfig).then(refreshData)">↻</button>
  </div>
</div>

<!-- WORKSPACE -->
<div class="workspace">

  <!-- CANVAS -->
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="bgCanvas"></canvas>
    <canvas id="edgeCanvas"></canvas>
    <canvas id="nodeCanvas"></canvas>
    <div class="nodes-layer" id="nodesLayer"></div>

    <div class="canvas-legend">
      <div class="legend-item"><div class="legend-line" style="background:var(--amber)"></div>Firewall / Policy boundary</div>
      <div class="legend-item"><div class="legend-line" style="background:var(--cyan)"></div>Gateway / Router link</div>
      <div class="legend-item"><div class="legend-line" style="background:var(--green);opacity:.6"></div>Zone interconnect</div>
      <div class="legend-item"><div class="legend-line" style="background:var(--purple);opacity:.6"></div>Interface / VLAN</div>
      <div class="legend-item"><div class="legend-line" style="background:#6b7280;opacity:.6;border-top:1px dashed #6b7280;height:0"></div>External / WAN</div>
    </div>

    <div class="zoom-controls">
      <button class="zoom-btn" onclick="zoom(1.2)">+</button>
      <button class="zoom-btn" onclick="zoom(0.83)">−</button>
      <button class="zoom-btn" onclick="fitView()" style="font-size:10px">FIT</button>
    </div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detailPanel">
    <div class="panel-header">
      <span class="panel-title" id="panelTitle">TOPOLOGY</span>
      <span class="panel-close" onclick="clearSelection()">✕</span>
    </div>
    <div class="panel-body" id="panelBody">
      <div class="panel-empty">
        <div class="panel-empty-icon">⬡</div>
        <div>Select any node to inspect its configuration, interfaces, routes, and active rules.</div>
      </div>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════════════════════════
// API FETCH — populate CONFIG from live containd endpoints
// ══════════════════════════════════════════════════════════════════════
//
// Endpoints used:
//   GET /api/v1/health              → { status, component, build, time }
//   GET /api/v1/zones               → [{ name, alias?, description? }]
//   GET /api/v1/interfaces          → [{ name, alias?, device?, zone?, vlanId?, addressMode?, addresses?, gateway? }]
//   GET /api/v1/interfaces/state    → [{ name, index, up, mtu, mac, addrs }]
//   GET /api/v1/routing             → { gateways?:[{name,address,iface?,description?}], routes?:[{dst,gateway?,iface?,metric?}] }
//   GET /api/v1/routing/os          → { routes:[{dst,gateway?,iface?,metric?}], defaultRoute?:{…} }
//   GET /api/v1/firewall/rules      → [{ id, description?, sourceZones?, destZones?, action:"ALLOW"|"DENY", protocols? }]
//   GET /api/v1/flows?limit=500     → [{ flowId, srcIp?, dstIp?, srcPort?, dstPort?, transport?, eventCount }]
//   GET /api/v1/events?limit=500    → [{ proto, kind, srcIp?, dstIp?, attributes?, timestamp }]
//
// Auth: same-origin cookies.  For standalone use pass ?token=JWT on the URL.

let CONFIG = null; // populated by fetchConfig()

const _urlToken = new URLSearchParams(location.search).get('token');
function _headers() {
  const h = { 'Accept': 'application/json' };
  if (_urlToken) h['Authorization'] = 'Bearer ' + _urlToken;
  return h;
}
async function _get(path) {
  try {
    const r = await fetch(path, { credentials: 'include', headers: _headers() });
    if (!r.ok) return null;
    return r.json();
  } catch { return null; }
}

async function fetchConfig() {
  const [health, zones, ifaces, ifaceState, routing, osRouting, fwRules, flows, events] =
    await Promise.all([
      _get('/api/v1/health'),
      _get('/api/v1/zones'),
      _get('/api/v1/interfaces'),
      _get('/api/v1/interfaces/state'),
      _get('/api/v1/routing'),
      _get('/api/v1/routing/os'),
      _get('/api/v1/firewall/rules'),
      _get('/api/v1/flows?limit=500'),
      _get('/api/v1/events?limit=500'),
    ]);

  // ── build per-zone lookup for flow/event stats ──
  const ifaceZone = {};          // interface name → zone name
  const zoneSubnet = {};         // zone name → first address CIDR
  for (const ifc of (ifaces || [])) {
    if (ifc.zone) ifaceZone[ifc.name] = ifc.zone;
    if (ifc.zone && ifc.addresses?.length && !zoneSubnet[ifc.zone]) {
      zoneSubnet[ifc.zone] = ifc.addresses[0];
    }
  }

  // Count unique IPs per zone from events
  const zoneHosts = {};   // zone → Set<ip>
  const zoneFlows = {};   // zone → Set<flowId>
  for (const ev of (events || [])) {
    const srcZone = ev.attributes?.srcZone;
    const dstZone = ev.attributes?.dstZone;
    for (const z of [srcZone, dstZone]) {
      if (!z) continue;
      if (!zoneHosts[z]) zoneHosts[z] = new Set();
      if (!zoneFlows[z]) zoneFlows[z] = new Set();
      if (ev.srcIp) zoneHosts[z].add(ev.srcIp);
      if (ev.dstIp) zoneHosts[z].add(ev.dstIp);
      if (ev.flowId) zoneFlows[z].add(ev.flowId);
    }
  }

  // Also count from flows endpoint
  for (const fl of (flows || [])) {
    for (const [ip, port] of [[fl.srcIp, fl.srcPort], [fl.dstIp, fl.dstPort]]) {
      for (const [zn, sub] of Object.entries(zoneSubnet)) {
        if (ip && _ipInCidr(ip, sub)) {
          if (!zoneHosts[zn]) zoneHosts[zn] = new Set();
          if (!zoneFlows[zn]) zoneFlows[zn] = new Set();
          zoneHosts[zn].add(ip);
          zoneFlows[zn].add(fl.flowId);
        }
      }
    }
  }

  // ── interface state map (keyed by both logical name and kernel device name) ──
  const stateMap = {};
  for (const s of (ifaceState || [])) stateMap[s.name] = s;

  function _ifaceState(ifc) {
    return stateMap[ifc.name] || stateMap[ifc.device] || null;
  }

  // ── build firewall.interfaces ──
  const builtIfaces = (ifaces || []).map(ifc => {
    const st = _ifaceState(ifc);
    const addr = ifc.addresses?.length ? ifc.addresses[0]
      : st?.addrs?.find(a => !a.startsWith('::') && !a.startsWith('fe80')) || '—';
    return {
      name: ifc.device || ifc.name,
      ip: addr,
      state: st?.up !== false ? 'up' : 'down',
      zone: ifc.zone || '—',
      rx: '—',
      tx: '—',
      vlan: ifc.vlanId || null,
    };
  });

  // ── gateway address lookup (routes reference gateway by name) ──
  const gwByName = {};
  for (const gw of (routing?.gateways || [])) gwByName[gw.name] = gw;

  // ── build routes ──
  const builtRoutes = [];
  for (const r of (routing?.routes || [])) {
    const gwName = r.gateway || '';
    const gwObj = gwByName[gwName];
    const gwDisplay = gwObj?.address || (gwName && gwName !== '—' ? gwName : '—');
    builtRoutes.push({
      dst: r.dst === 'default' ? '0.0.0.0/0' : (r.dst || '—'),
      gw: gwDisplay,
      iface: r.iface || '—',
      origin: 'static',
      metric: r.metric ?? 0,
    });
  }
  // Add connected/local routes from interfaces
  for (const ifc of (ifaces || [])) {
    if (!ifc.addresses?.length) continue;
    const alreadyHas = builtRoutes.some(r => r.dst === ifc.addresses[0]);
    if (!alreadyHas) {
      builtRoutes.push({
        dst: ifc.addresses[0],
        gw: '—',
        iface: ifc.name,
        origin: 'local',
        metric: 0,
      });
    }
  }
  // Append OS default route if not already present
  const osDflt = osRouting?.defaultRoute;
  if (osDflt && !builtRoutes.some(r => r.dst === '0.0.0.0/0' || r.dst === 'default')) {
    builtRoutes.push({
      dst: '0.0.0.0/0',
      gw: osDflt.gateway || '—',
      iface: osDflt.iface || '—',
      origin: 'dynamic',
      metric: osDflt.metric ?? 0,
    });
  }

  // ── build policy rules ──
  const builtRules = (fwRules || []).map(r => {
    const src = (r.sourceZones || []).join(',') || '*';
    const dst = (r.destZones || []).join(',') || '*';
    const ports = (r.protocols || []).map(p => p.port ? `${p.name}/${p.port}` : p.name).join(',');
    return {
      action: (r.action || 'DENY').toLowerCase(),
      desc: `${src} → ${dst}${ports ? ' ' + ports : ''}`,
      hits: 0, // hit counters not exposed by API
    };
  });

  // ── gateway ──
  const gwCfg = routing?.gateways?.[0];
  const gwAddr = gwCfg?.address || osDflt?.gateway || '—';
  const gwIface = gwCfg?.iface || osDflt?.iface || '';

  // ── uptime from health.time (ISO) ──
  let uptimeStr = '—';
  if (health?.time) {
    const bootMs = Date.now() - new Date(health.time).getTime();
    if (bootMs > 0) {
      const d = Math.floor(bootMs / 86400000);
      const h = Math.floor((bootMs % 86400000) / 3600000);
      const m = Math.floor((bootMs % 3600000) / 60000);
      uptimeStr = `${d}d ${h}h ${m}m`;
    }
  }

  // ── IDS alert count per zone for status colouring ──
  const zoneAlerts = {};
  for (const ev of (events || [])) {
    if (ev.kind !== 'alert') continue;
    for (const z of [ev.attributes?.srcZone, ev.attributes?.dstZone]) {
      if (z) zoneAlerts[z] = (zoneAlerts[z] || 0) + 1;
    }
  }

  // ── session count from flows ──
  const sessionCount = (flows || []).length;

  // ── assemble zones ──
  const builtZones = (zones || []).map(z => {
    const name = z.name;
    const ifc = (ifaces || []).find(i => i.zone === name);
    const st = ifc ? _ifaceState(ifc) : null;
    const subnet = zoneSubnet[name] || st?.addrs?.find(a => !a.startsWith('::') && !a.startsWith('fe80')) || '—';
    const hosts = zoneHosts[name]?.size || 0;
    const flCount = zoneFlows[name]?.size || 0;
    const alerts = zoneAlerts[name] || 0;
    const status = alerts >= 5 ? 'crit' : alerts >= 1 ? 'warn' : 'ok';
    return {
      id: 'zone-' + name.toLowerCase().replace(/[^a-z0-9]+/g, '_'),
      name: name.toUpperCase(),
      type: 'zone',
      status,
      iface: ifc?.device || ifc?.name || '—',
      subnet,
      hosts,
      flows: flCount,
      rx: '—', tx: '—',
      vlan: ifc?.vlanId || null,
      desc: z.description || z.alias || '',
    };
  });

  CONFIG = {
    firewall: {
      id: 'fw-main',
      name: 'CONTAIND',
      type: 'firewall',
      hostname: health?.component || 'containd',
      version: health?.build || 'dev-build',
      uptime: uptimeStr,
      cpu: 0, mem: 0,
      sessions: sessionCount,
      interfaces: builtIfaces,
      routes: builtRoutes,
      rules: builtRules,
    },
    gateway: {
      id: 'gw-isp',
      name: gwCfg?.name?.toUpperCase() || 'ISP-GW',
      type: 'gateway',
      ip: gwAddr,
      asn: '—',
      uptime: '—',
      latency: '—',
      loss: '—',
    },
    internet: { id: 'internet', name: 'INTERNET', type: 'internet' },
    zones: builtZones,
  };
  return CONFIG;
}

// Minimal CIDR matcher for zone→IP attribution
function _ipInCidr(ip, cidr) {
  if (!cidr || !ip) return false;
  const [base, bits] = cidr.split('/');
  if (!bits) return ip === base;
  const mask = (-1 << (32 - parseInt(bits))) >>> 0;
  return (_ip4(ip) & mask) === (_ip4(base) & mask);
}
function _ip4(s) {
  const p = (s || '').split('.');
  return ((+p[0]) << 24 | (+p[1]) << 16 | (+p[2]) << 8 | (+p[3])) >>> 0;
}

// ══════════════════════════════════════════════════════════════════════
// LAYOUT  (positions as % of canvas)
// ══════════════════════════════════════════════════════════════════════
const LAYOUT = {
  'internet':     { x:0.50, y:0.04 },
  'gw-isp':       { x:0.50, y:0.15 },
  'fw-main':      { x:0.50, y:0.32 },
  // zone positions are populated dynamically from CONFIG
};

// Edge definitions: [fromId, toId, style]
// style: 'wan'|'gw'|'zone'|'iface'
// Populated dynamically in rebuildFromConfig()
const EDGES = [];

const EDGE_STYLES = {
  wan:   { color:'#6b728066', width:1, dash:[6,5] },
  gw:    { color:'#06b6d480', width:2, dash:[] },
  zone:  { color:'#22c55e55', width:1.5, dash:[] },
  iface: { color:'#a855f755', width:1, dash:[3,4] },
};

// ══════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════
let scale = 1, offsetX = 0, offsetY = 0;
let isDragging = false, dragStart = { x:0, y:0 }, dragOffset = { x:0, y:0 };
let selectedId = null;
let currentView = 'logical';
// live traffic sparklines (rolling 14 samples)
const trafficHistory = {};

// ══════════════════════════════════════════════════════════════════════
// CANVAS SETUP
// ══════════════════════════════════════════════════════════════════════
const wrap    = document.getElementById('canvasWrap');
const bgCvs   = document.getElementById('bgCanvas');
const edgeCvs = document.getElementById('edgeCanvas');
const nodeCvs = document.getElementById('nodeCanvas');
const bgCtx   = bgCvs.getContext('2d');
const edgeCtx = edgeCvs.getContext('2d');
const nodeCtx = nodeCvs.getContext('2d');

function resizeCanvases() {
  [bgCvs, edgeCvs, nodeCvs].forEach(c => {
    c.width  = wrap.offsetWidth;
    c.height = wrap.offsetHeight;
  });
  drawAll();
}
window.addEventListener('resize', resizeCanvases);

// ══════════════════════════════════════════════════════════════════════
// COORDINATE TRANSFORM
// ══════════════════════════════════════════════════════════════════════
function worldToScreen(wx, wy) {
  return {
    x: wx * bgCvs.width  * scale + offsetX,
    y: wy * bgCvs.height * scale + offsetY,
  };
}

// ══════════════════════════════════════════════════════════════════════
// BUILD NODES
// ══════════════════════════════════════════════════════════════════════
let ALL_NODES = [];

const NODE_ICONS = {
  internet: '🌐',
  firewall: '🛡',
  gateway:  '⇄',
  zone:     '◈',
};

const STATUS_COLORS = {
  ok:   '#22c55e',
  warn: '#f59e0b',
  crit: '#ef4444',
  down: '#6b7280',
};

function getNodeData(id) {
  return ALL_NODES.find(n => n.id === id);
}

function initTrafficHistory() {
  ALL_NODES.forEach(n => {
    trafficHistory[n.id] = Array.from({length:14}, () => Math.random() * 0.6 + 0.1);
  });
}

function buildNodes() {
  const layer = document.getElementById('nodesLayer');
  layer.innerHTML = '';

  ALL_NODES.forEach(n => {
    if (!LAYOUT[n.id]) return;
    const pos = LAYOUT[n.id];
    const { x: sx, y: sy } = worldToScreen(pos.x, pos.y);

    const el = document.createElement('div');
    el.className = 'node';
    el.id = 'node-' + n.id;
    el.dataset.type   = n.type;
    el.dataset.nodeid = n.id;
    if (n.status) el.dataset.status = n.status;

    el.style.left = sx + 'px';
    el.style.top  = sy + 'px';
    el.style.animationDelay = (Math.random() * 0.3) + 's';

    const statusColor = STATUS_COLORS[n.status || 'ok'];
    const icon = NODE_ICONS[n.type] || '◆';

    // Build spark
    const hist = trafficHistory[n.id] || [];
    const sparkBars = hist.map(v => {
      const h = Math.max(2, Math.floor(v * 14));
      const sparkColor = n.type === 'firewall' ? '#f59e0b' :
                         n.type === 'zone'     ? (n.status === 'warn' ? '#f59e0b' : '#22c55e') :
                         n.type === 'gateway'  ? '#06b6d4' : '#6b7280';
      return `<div class="spark" style="height:${h}px;background:${sparkColor}"></div>`;
    }).join('');

    // Extra rows by type
    let extraRows = '';
    if (n.type === 'firewall') {
      extraRows = `
        <div class="node-row"><span class="node-row-key">sessions</span><span class="node-row-val">${n.sessions}</span></div>
        <div class="node-row"><span class="node-row-key">cpu</span><span class="node-row-val">${n.cpu}%</span></div>
        <div class="node-row"><span class="node-row-key">mem</span><span class="node-row-val">${n.mem}%</span></div>
      `;
    } else if (n.type === 'zone') {
      extraRows = `
        <div class="node-row"><span class="node-row-key">subnet</span><span class="node-row-val">${n.subnet}</span></div>
        <div class="node-row"><span class="node-row-key">hosts</span><span class="node-row-val">${n.hosts}</span></div>
        <div class="node-row"><span class="node-row-key">flows</span><span class="node-row-val">${n.flows}</span></div>
      `;
    } else if (n.type === 'gateway') {
      extraRows = `
        <div class="node-row"><span class="node-row-key">ip</span><span class="node-row-val">${n.ip}</span></div>
        <div class="node-row"><span class="node-row-key">latency</span><span class="node-row-val">${n.latency}</span></div>
      `;
    }

    el.innerHTML = `
      <div class="node-card">
        <div class="node-header">
          <span class="node-icon">${icon}</span>
          <span class="node-name">${n.name}</span>
          <div class="node-status-dot" style="background:${statusColor};box-shadow:0 0 5px ${statusColor}80"></div>
        </div>
        <div class="node-body">
          ${extraRows}
          <div class="node-sparkline">${sparkBars}</div>
        </div>
      </div>
    `;

    el.addEventListener('click', e => { e.stopPropagation(); selectNode(n.id); });
    layer.appendChild(el);
  });
}

// ══════════════════════════════════════════════════════════════════════
// DRAW EDGES
// ══════════════════════════════════════════════════════════════════════
// Animated packets on edges
const edgePackets = [];
let lastPacketTime = 0;

function spawnEdgePacket() {
  const edge = EDGES[Math.floor(Math.random() * EDGES.length)];
  if (edge[2] === 'wan' && Math.random() > 0.3) return;
  const rev = Math.random() > 0.55;
  edgePackets.push({
    from: rev ? edge[1] : edge[0],
    to:   rev ? edge[0] : edge[1],
    t: 0,
    speed: 0.004 + Math.random() * 0.008,
    color: EDGE_STYLES[edge[2]].color.replace(/[0-9a-f]{2}$/, 'ff'),
    r: 2,
  });
}

function drawEdges(t) {
  const W = edgeCvs.width, H = edgeCvs.height;
  edgeCtx.clearRect(0, 0, W, H);

  EDGES.forEach(([fromId, toId, style]) => {
    const fl = LAYOUT[fromId], tl = LAYOUT[toId];
    if (!fl || !tl) return;
    const a = worldToScreen(fl.x, fl.y);
    const b = worldToScreen(tl.x, tl.y);
    const st = EDGE_STYLES[style];

    edgeCtx.beginPath();
    edgeCtx.moveTo(a.x, a.y);

    // Slight curve for parallel edges
    const mx = (a.x + b.x) / 2 + (Math.random() < 0.5 ? 20 : -20) * 0;
    const my = (a.y + b.y) / 2;
    edgeCtx.lineTo(b.x, b.y);

    edgeCtx.strokeStyle = st.color;
    edgeCtx.lineWidth = st.width * scale;
    edgeCtx.setLineDash(st.dash.map(d => d * scale));
    edgeCtx.stroke();
    edgeCtx.setLineDash([]);

    // Bandwidth label
    if (style === 'zone' || style === 'gw') {
      const lx = (a.x + b.x) / 2, ly = (a.y + b.y) / 2;
      edgeCtx.font = `${Math.floor(8 * scale)}px 'Share Tech Mono'`;
      edgeCtx.fillStyle = 'rgba(245,158,11,0.3)';
      edgeCtx.textAlign = 'center';
      // find zone for label
      const zoneNode = ALL_NODES.find(n => n.id === toId || n.id === fromId);
      if (zoneNode && zoneNode.rx) {
        edgeCtx.fillText(zoneNode.rx, lx + 6, ly - 5);
      }
    }
  });

  // Draw packets
  edgePackets.forEach(p => {
    const fl = LAYOUT[p.from], tl = LAYOUT[p.to];
    if (!fl || !tl) return;
    const a = worldToScreen(fl.x, fl.y);
    const b = worldToScreen(tl.x, tl.y);
    const x = a.x + (b.x - a.x) * p.t;
    const y = a.y + (b.y - a.y) * p.t;

    edgeCtx.beginPath();
    edgeCtx.arc(x, y, p.r * scale, 0, Math.PI * 2);
    edgeCtx.fillStyle = p.color;
    edgeCtx.shadowColor = p.color;
    edgeCtx.shadowBlur = 6;
    edgeCtx.fill();
    edgeCtx.shadowBlur = 0;
  });
}

function drawBg() {
  const W = bgCvs.width, H = bgCvs.height;
  bgCtx.clearRect(0, 0, W, H);

  // Subtle dot grid
  const spacing = 28 * scale;
  const ox = offsetX % spacing, oy = offsetY % spacing;
  bgCtx.fillStyle = 'rgba(245,158,11,0.06)';
  for (let x = ox - spacing; x < W + spacing; x += spacing) {
    for (let y = oy - spacing; y < H + spacing; y += spacing) {
      bgCtx.beginPath();
      bgCtx.arc(x, y, 1, 0, Math.PI * 2);
      bgCtx.fill();
    }
  }

  // Security zone bands (logical view)
  if (currentView === 'logical') {
    const bands = [
      { label:'UNTRUSTED', y:0.0, h:0.22, color:'rgba(107,114,128,0.03)' },
      { label:'PERIMETER', y:0.22, h:0.18, color:'rgba(245,158,11,0.025)' },
      { label:'TRUSTED ZONES', y:0.40, h:0.60, color:'rgba(34,197,94,0.02)' },
    ];
    bands.forEach(b => {
      const sy = b.y * H * scale + offsetY;
      const sh = b.h * H * scale;
      bgCtx.fillStyle = b.color;
      bgCtx.fillRect(0, sy, W, sh);
      bgCtx.font = `9px 'Share Tech Mono'`;
      bgCtx.fillStyle = 'rgba(255,255,255,0.06)';
      bgCtx.textAlign = 'right';
      bgCtx.fillText(b.label, W - 14, sy + 14);
    });
  }
}

// ══════════════════════════════════════════════════════════════════════
// SELECTION + DETAIL PANEL
// ══════════════════════════════════════════════════════════════════════
function selectNode(id) {
  // Deselect prev
  document.querySelectorAll('.node.selected').forEach(n => n.classList.remove('selected'));
  selectedId = id;
  document.getElementById('node-' + id)?.classList.add('selected');
  renderDetailPanel(id);
}

function clearSelection() {
  document.querySelectorAll('.node.selected').forEach(n => n.classList.remove('selected'));
  selectedId = null;
  document.getElementById('panelTitle').textContent = 'TOPOLOGY';
  document.getElementById('panelBody').innerHTML = `
    <div class="panel-empty">
      <div class="panel-empty-icon">⬡</div>
      <div>Select any node to inspect its configuration, interfaces, routes, and active rules.</div>
    </div>`;
}

function renderDetailPanel(id) {
  const n = getNodeData(id);
  if (!n) return;
  document.getElementById('panelTitle').textContent = n.name;
  const body = document.getElementById('panelBody');
  body.innerHTML = '';

  // ── STATUS SECTION ──
  const statusColor = STATUS_COLORS[n.status || 'ok'];
  const statusLabel = { ok:'ONLINE', warn:'WARNING', crit:'CRITICAL', down:'OFFLINE' }[n.status || 'ok'];

  let statusHTML = `<div class="panel-section">
    <div class="panel-section-label">Status</div>
    <div class="detail-row"><span class="detail-key">State</span><span class="detail-val" style="color:${statusColor}">${statusLabel}</span></div>
    <div class="detail-row"><span class="detail-key">Type</span><span class="detail-val">${n.type.toUpperCase()}</span></div>`;

  if (n.type === 'firewall') {
    statusHTML += `
    <div class="detail-row"><span class="detail-key">Hostname</span><span class="detail-val">${n.hostname}</span></div>
    <div class="detail-row"><span class="detail-key">Version</span><span class="detail-val amber">${n.version}</span></div>
    <div class="detail-row"><span class="detail-key">Uptime</span><span class="detail-val green">${n.uptime}</span></div>
    <div class="detail-row"><span class="detail-key">CPU</span><span class="detail-val">${n.cpu}%</span></div>
    <div class="detail-row"><span class="detail-key">Memory</span><span class="detail-val">${n.mem}%</span></div>
    <div class="detail-row"><span class="detail-key">Sessions</span><span class="detail-val cyan">${n.sessions}</span></div>`;
  } else if (n.type === 'zone') {
    statusHTML += `
    <div class="detail-row"><span class="detail-key">Subnet</span><span class="detail-val cyan">${n.subnet}</span></div>
    <div class="detail-row"><span class="detail-key">Interface</span><span class="detail-val">${n.iface}</span></div>
    <div class="detail-row"><span class="detail-key">Hosts</span><span class="detail-val">${n.hosts}</span></div>
    <div class="detail-row"><span class="detail-key">Active flows</span><span class="detail-val green">${n.flows}</span></div>
    <div class="detail-row"><span class="detail-key">RX</span><span class="detail-val">${n.rx}</span></div>
    <div class="detail-row"><span class="detail-key">TX</span><span class="detail-val">${n.tx}</span></div>`;
    if (n.vlan) statusHTML += `<div class="detail-row"><span class="detail-key">VLAN</span><span class="detail-val amber">${n.vlan}</span></div>`;
    statusHTML += `<div class="detail-row"><span class="detail-key">Description</span><span class="detail-val" style="color:var(--text-dim)">${n.desc}</span></div>`;
  } else if (n.type === 'gateway') {
    statusHTML += `
    <div class="detail-row"><span class="detail-key">IP</span><span class="detail-val cyan">${n.ip}</span></div>
    <div class="detail-row"><span class="detail-key">ASN</span><span class="detail-val">${n.asn}</span></div>
    <div class="detail-row"><span class="detail-key">Latency</span><span class="detail-val green">${n.latency}</span></div>
    <div class="detail-row"><span class="detail-key">Packet loss</span><span class="detail-val green">${n.loss}</span></div>`;
  }
  statusHTML += '</div>';
  body.innerHTML += statusHTML;

  // ── INTERFACES (firewall only) ──
  if (n.type === 'firewall' && n.interfaces) {
    let ifHTML = `<div class="panel-section"><div class="panel-section-label">Interfaces</div><div class="iface-list">`;
    n.interfaces.forEach(iface => {
      ifHTML += `
        <div class="iface-item">
          <div class="iface-top">
            <span class="iface-name">${iface.name}</span>
            <span class="iface-state ${iface.state}">${iface.state.toUpperCase()}</span>
          </div>
          <div class="iface-ip">${iface.ip} &nbsp;·&nbsp; ${iface.zone}</div>
          <div class="iface-stats">
            <span>↓ ${iface.rx}</span>
            <span>↑ ${iface.tx}</span>
          </div>
        </div>`;
    });
    ifHTML += '</div></div>';
    body.innerHTML += ifHTML;
  }

  // ── ROUTES (firewall only) ──
  if (n.type === 'firewall' && n.routes) {
    let rtHTML = `<div class="panel-section"><div class="panel-section-label">Routing Table</div>
      <table class="route-table">
        <tr><th>Destination</th><th>Via</th><th>Iface</th><th>Origin</th></tr>`;
    n.routes.forEach(r => {
      const cls = r.origin === 'static' ? 'origin-static' : r.origin === 'dynamic' ? 'origin-dynamic' : 'origin-local';
      rtHTML += `<tr>
        <td>${r.dst}</td>
        <td>${r.gw}</td>

        <td><span class="route-origin ${cls}">${r.origin}</span></td>
      </tr>`;
    });
    rtHTML += '</table></div>';
    body.innerHTML += rtHTML;

  // ── RULES (firewall + zones) ──
  const rules = n.rules || (n.type === 'zone' ? [
    { action:'allow', desc:`LAN → ${n.name}`, hits: Math.floor(Math.random()*500) },
    { action:'allow', desc:`${n.name} → WAN`, hits: Math.floor(Math.random()*200) },
    { action:'deny',  desc:`WAN → ${n.name} (default)`, hits: Math.floor(Math.random()*2000) },
  ] : null);

  if (rules) {
    let rlHTML = `<div class="panel-section"><div class="panel-section-label">Policy Rules</div><div class="rule-list">`;
    rules.forEach(r => {
      rlHTML += `
        <div class="rule-item ${r.action}">
          <span class="rule-action">${r.action.toUpperCase()}</span>
          <span class="rule-desc">${r.desc}</span>
          <span class="rule-hits">${r.hits.toLocaleString()}</span>
        </div>`;
    });
    rlHTML += '</div></div>';
    body.innerHTML += rlHTML;
  }
}

// ══════════════════════════════════════════════════════════════════════
// PAN + ZOOM
// ══════════════════════════════════════════════════════════════════════
wrap.addEventListener('mousedown', e => {
  if (e.target.closest('.node')) return;
  isDragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  dragOffset = { x: offsetX, y: offsetY };
  wrap.classList.add('dragging');
});

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  offsetX = dragOffset.x + (e.clientX - dragStart.x);
  offsetY = dragOffset.y + (e.clientY - dragStart.y);
  updateNodePositions();
  drawAll();
});

window.addEventListener('mouseup', () => {
  isDragging = false;
  wrap.classList.remove('dragging');
});

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.11;
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  offsetX = mx - (mx - offsetX) * delta;
  offsetY = my - (my - offsetY) * delta;
  scale = Math.min(3, Math.max(0.3, scale * delta));
  updateNodePositions();
  drawAll();
}, { passive: false });

function zoom(factor) {
  const cx = wrap.offsetWidth / 2, cy = wrap.offsetHeight / 2;
  offsetX = cx - (cx - offsetX) * factor;
  offsetY = cy - (cy - offsetY) * factor;
  scale = Math.min(3, Math.max(0.3, scale * factor));
  updateNodePositions();
  drawAll();
}

function fitView() {
  scale = 1; offsetX = 0; offsetY = 0;
  updateNodePositions();
  drawAll();
}

function updateNodePositions() {
  ALL_NODES.forEach(n => {
    const pos = LAYOUT[n.id];
    if (!pos) return;
    const el = document.getElementById('node-' + n.id);
    if (!el) return;
    const { x, y } = worldToScreen(pos.x, pos.y);
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
  });
}

// ══════════════════════════════════════════════════════════════════════
// VIEW MODES
// ══════════════════════════════════════════════════════════════════════
function setView(v, el) {
  currentView = v;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  drawAll();
}

// ══════════════════════════════════════════════════════════════════════
// TRAFFIC SIMULATION
// ══════════════════════════════════════════════════════════════════════
function updateTraffic() {
  ALL_NODES.forEach(n => {
    if (!trafficHistory[n.id]) return;
    trafficHistory[n.id].shift();
    trafficHistory[n.id].push(Math.max(0.05, Math.min(1, trafficHistory[n.id].at(-1) + (Math.random() - 0.5) * 0.2)));
  });
  // Re-render sparklines only
  ALL_NODES.forEach(n => {
    const el = document.getElementById('node-' + n.id);
    if (!el) return;
    const sparkEl = el.querySelector('.node-sparkline');
    if (!sparkEl) return;
    const hist = trafficHistory[n.id];
    const sparkColor = n.type === 'firewall' ? '#f59e0b' :
                       n.type === 'zone'     ? (n.status === 'warn' ? '#f59e0b' : '#22c55e') :
                       n.type === 'gateway'  ? '#06b6d4' : '#6b7280';
    sparkEl.innerHTML = hist.map(v => {
      const h = Math.max(2, Math.floor(v * 14));
      return `<div class="spark" style="height:${h}px;background:${sparkColor}"></div>`;
    }).join('');
  });
}

async function refreshData() {
  document.getElementById('syncTime').textContent = new Date().toLocaleTimeString('en-US',{hour12:false});
}

// ══════════════════════════════════════════════════════════════════════
// MAIN LOOP
// ══════════════════════════════════════════════════════════════════════
function drawAll() {
  drawBg();
  drawEdges();
}

let frame = 0;
function loop(t) {
  frame++;

  if (frame % 20 === 0) spawnEdgePacket();

  for (let i = edgePackets.length - 1; i >= 0; i--) {
    edgePackets[i].t += edgePackets[i].speed;
    if (edgePackets[i].t >= 1) edgePackets.splice(i, 1);
  }

  drawEdges();
  requestAnimationFrame(loop);
}

function rebuildFromConfig() {
  ALL_NODES = [
    CONFIG.internet,
    CONFIG.gateway,
    CONFIG.firewall,
    ...CONFIG.zones,
  ];
  // Rebuild LAYOUT if zones changed (keep fixed nodes, add new zones dynamically)
  CONFIG.zones.forEach((z, i) => {
    if (!LAYOUT[z.id]) {
      // Spread new zones in available positions
      const basePositions = [
        { x:0.20, y:0.20 }, { x:0.75, y:0.48 }, { x:0.35, y:0.58 },
        { x:0.64, y:0.70 }, { x:0.20, y:0.75 }, { x:0.80, y:0.25 },
        { x:0.15, y:0.50 }, { x:0.85, y:0.65 },
      ];
      LAYOUT[z.id] = basePositions[i % basePositions.length];
    }
  });
  // Rebuild EDGES: firewall → each zone
  EDGES.length = 0;
  EDGES.push(['internet', 'gw-isp', 'wan']);
  EDGES.push(['gw-isp', 'fw-main', 'gw']);
  CONFIG.zones.forEach(z => {
    const style = z.name === 'WAN' ? 'iface' : 'zone';
    EDGES.push(['fw-main', z.id, style]);
  });
  initTrafficHistory();
  buildNodes();
  drawAll();
}

async function init() {
  resizeCanvases();

  // Show loading state
  document.getElementById('syncTime').textContent = 'loading...';

  await fetchConfig();

  rebuildFromConfig();
  refreshData();

  // Re-poll every 30s
  setInterval(async () => {
    await fetchConfig();
    rebuildFromConfig();
    if (selectedId) renderDetailPanel(selectedId);
    refreshData();
  }, 30000);

  setInterval(updateTraffic, 2000);
  loop(0);

  // Click on canvas background = deselect
  wrap.addEventListener('click', e => {
    if (!e.target.closest('.node')) clearSelection();
  });
}

init();
</script>
</body>
